. Độ trễ tổng thể của cuộc gọi", "C. Sự biến thiên về độ trễ giữa các gói tin", "D. Tiếng vọng trong cuộc gọi"],a:2,e:`Jitter là sự biến thiên về độ trễ giữa các gói tin liên tiếp (packet delay variation).`},{c:"VHF - Lý thuyết chung",q:`Theo khuyến nghị của ITU-T G.114, độ trễ một chiều (one-way latency) tối đa chấp nhận được cho cuộc gọi thoại chất lượng tốt là bao nhiêu?`,o:["A. 50 ms", "B. 150 ms", "C. 400 ms", "D. 1000 ms"],a:1,e:`ITU-T G.114: độ trễ một chiều tối đa cho thoại chất lượng tốt là 150 ms.`},{c:"VHF - Lý thuyết chung",q:`Cổng (port) UDP mặc định cho giao thức SIP là gì?`,o:["A. 25", "B. 80", "C. 5060", "D. 8080"],a:2,e:`Cổng UDP mặc định cho SIP là 5060 (5061 cho SIP/TLS).`},{c:"VHF - Lý thuyết chung",q:`Thiết bị nào đóng vai trò chuyển đổi giữa mạng PSTN truyền thống và mạng VoIP?`,o:["A. Router", "B. Switch", "C. VoIP Gateway", "D. Hub"],a:2,e:`VoIP Gateway chuyển đổi giữa mạng PSTN truyền thống (TDM/analog) và mạng VoIP (IP).`},{c:"VHF - Lý thuyết chung",q:`Trong kiến trúc SIP, thành phần nào chịu trách nhiệm định vị người dùng (registrar) và chuyển tiếp yêu cầu cuộc gọi?`,o:["A. User Agent", "B. SIP Proxy/Registrar Server", "C. RTP Mixer", "D. Media Gateway Controller"],a:1,e:`SIP Proxy/Registrar Server định vị người dùng (registrar) và chuyển tiếp yêu cầu cuộc gọi (proxy).`},{c:"VHF - Lý thuyết chung",q:`Giao thức nào thường được dùng để mô tả các tham số phiên truyền thông (codec, cổng, địa chỉ IP) trong VoIP?`,o:["A. SDP (Session Description Protocol)", "B. LDAP", "C. DHCP", "D. ARP"],a:0,e:`SDP (Session Description Protocol) mô tả tham số phiên: codec, cổng, địa chỉ IP trong VoIP.`},{c:"VHF - Lý thuyết chung",q:`Cơ chế QoS nào sử dụng trường DSCP trong tiêu đề IP để ưu tiên gói thoại?`,o:["A. Best Effort", "B. DiffServ", "C. NAT", "D. STP"],a:1,e:`DiffServ sử dụng trường DSCP (6 bit) trong tiêu đề IP để phân loại và ưu tiên gói thoại.`},{c:"VHF - Lý thuyết chung",q:`Giá trị DSCP nào thường được khuyến nghị cho gói thoại VoIP (Expedited Forwarding)?`,o:["A. AF11", "B. CS0", "C. EF (46)", "D. BE"],a:2,e:`DSCP EF (Expedited Forwarding, giá trị 46/0x2E) được khuyến nghị cho gói thoại VoIP ưu tiên cao nhất.`},{c:"VHF - Lý thuyết chung",q:`Giao thức nào được sử dụng để bảo mật (mã hoá) luồng RTP trong VoIP?`,o:["A. SRTP", "B. SSH", "C. PGP", "D. WEP"],a:0,e:`SRTP (Secure Real-time Transport Protocol) mã hoá và bảo vệ tính toàn vẹn luồng RTP trong VoIP.`},{c:"VHF - Lý thuyết chung",q:`Tiêu chuẩn ED-137 của EUROCAE quy định nội dung gì?`,o:["A. Tiêu chuẩn radar giám sát", "B. Tiêu chuẩn VoIP cho truyền thông không lưu (ATM)", "C. Tiêu chuẩn dẫn đường vệ tinh", "D. Tiêu chuẩn dữ liệu khí tượng hàng không"],a:1,e:`ED-137 của EUROCAE là tiêu chuẩn VoIP cho truyền thông không lưu (Air Traffic Management - ATM).`},{c:"VHF - Lý thuyết chung",q:`Trong môi trường VoIP, MOS (Mean Opinion Score) dùng để đánh giá điều gì?`,o:["A. Tốc độ đường truyền", "B. Mức tiêu thụ điện năng", "C. Chất lượng thoại theo cảm nhận người nghe", "D. Độ tin cậy của phần cứng"],a:2,e:`MOS (Mean Opinion Score) đánh giá chất lượng thoại theo cảm nhận chủ quan của người nghe (1–5).`},{c:"VHF - Lý thuyết chung",q:`Thang điểm MOS có giá trị tốt (good) tương ứng với khoảng nào?`,o:["A. 1.0 – 2.0", "B. 2.0 – 3.0", "C. 4.0 – 4.5", "D. 4.5 – 5.0"],a:2,e:`MOS 4.0–4.5 được coi là 'Good' (tốt); MOS > 4.5 là 'Excellent'.`},{c:"VHF - Lý thuyết chung",q:`Tỷ lệ mất gói (packet loss) tối đa chấp nhận được cho thoại VoIP chất lượng tốt thường là:`,o:["A. Dưới 1%", "B. 5 – 10%", "C. 15 – 20%", "D. Không giới hạn"],a:0,e:`Tỷ lệ mất gói chấp nhận được cho VoIP chất lượng tốt: dưới 1%.`},{c:"VHF - Lý thuyết chung",q:`Trong các giao thức sau, giao thức nào KHÔNG phải là giao thức báo hiệu (signaling) cho VoIP?`,o:["A. SIP", "B. H.323", "C. MGCP", "D. SNMP"],a:3,e:`SNMP là giao thức quản lý mạng, không phải giao thức báo hiệu VoIP. SIP, H.323 và MGCP là báo hiệu VoIP.`},{c:"VHF - Lý thuyết chung",q:`Tiêu chuẩn ED-137 được phát triển và ban hành bởi tổ chức nào?`,o:["A. ICAO", "B. EUROCAE", "C. RTCA", "D. ETSI"],a:1,e:`ED-137 được phát triển và ban hành bởi EUROCAE (European Organisation for Civil Aviation Equipment).`},{c:"VHF - Lý thuyết chung",q:`ED-137 Volume 1 (Part 1) quy định nội dung gì?`,o:["A. Giao diện Telephone giữa các VCS", "B. Giao diện Radio (R2S) giữa VCS và Radio Gateway", "C. Ghi âm thoại không lưu", "D. Giám sát hệ thống VCS"],a:1,e:`ED-137 Volume 1 (Part 1) quy định giao diện Radio (R2S) giữa VCS và Radio Gateway.`},{c:"VHF - Lý thuyết chung",q:`ED-137 Volume 2 quy định nội dung gì?`,o:["A. Radio", "B. Telephone (liên lạc điện thoại ATS)", "C. Recording", "D. Supervision"],a:1,e:`ED-137 Volume 2 quy định giao diện Telephone (liên lạc điện thoại ATS giữa các VCS).`},{c:"VHF - Lý thuyết chung",q:`ED-137 Volume 3 quy định nội dung gì?`,o:["A. Recording (Ghi âm thoại)", "B. Radio", "C. Test procedures", "D. Security"],a:0,e:`ED-137 Volume 3 quy định Recording (ghi âm thoại không lưu).`},{c:"VHF - Lý thuyết chung",q:`ED-137 Volume 4 (Supervision) chủ yếu sử dụng giao thức nào để giám sát hệ thống VoIP?`,o:["A. HTTP", "B. SNMP", "C. ICMP", "D. NTP"],a:1,e:`ED-137 Volume 4 (Supervision) dùng SNMP để giám sát và quản lý hệ thống VoIP không lưu.`},{c:"VHF - Lý thuyết chung",q:`ED-137 Volume 7 tập trung vào nội dung nào?`,o:["A. Test procedures", "B. Security (bảo mật)", "C. Telephone", "D. Recording"],a:1,e:`ED-137 Volume 7 tập trung vào Security (bảo mật hệ thống VoIP không lưu).`},{c:"VHF - Lý thuyết chung",q:`Codec thoại bắt buộc (mandatory) trong ED-137 cho radio là gì?`,o:["A. G.729", "B. G.722", "C. G.711 A-law (PCMA)", "D. Opus"],a:2,e:`ED-137 Vol 1 quy định codec bắt buộc là G.711 A-law (PCMA) cho radio, 64 kbps, 8 kHz sampling.`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 1, các tín hiệu PTT (Push-to-Talk) và SQU (Squelch) được truyền theo cơ chế nào?`,o:["A. SIP INFO message riêng biệt", "B. RTP header extension", "C. UDP packet riêng ngoài luồng RTP", "D. REST API qua HTTPS"],a:1,e:`Trong ED-137 Vol 1, tín hiệu PTT và SQU được truyền qua RTP header extension (không phải gói riêng).`},{c:"VHF - Lý thuyết chung",q:`Thuật ngữ R2S trong ED-137 Vol 1 có nghĩa là gì?`,o:["A. Radio to Satellite", "B. Radio to System (giao diện giữa Radio Gateway và VCS)", "C. Recording to Server", "D. Receiver to Sender"],a:1,e:`R2S = Radio to System: giao diện giữa Radio Gateway và hệ thống VCS theo ED-137 Vol 1.`},{c:"VHF - Lý thuyết chung",q:`BSS trong ED-137 là viết tắt của khái niệm nào?`,o:["A. Backup Signal Server", "B. Base Station Setup", "C. Basic Service Set", "D. Best Signal Selection"],a:3,e:`BSS = Best Signal Selection: cơ chế chọn tín hiệu tốt nhất trong hệ thống đa điểm thu (diversity).`},{c:"VHF - Lý thuyết chung",q:`Climax mode (offset carrier) trong ED-137 dùng để làm gì?`,o:["A. Mã hoá đường truyền VoIP", "B. Nén tín hiệu thoại để tiết kiệm băng thông", "C. Cho phép nhiều máy phát hoạt động trên cùng tần số với độ lệch tần số rất nhỏ", "D. Đồng bộ thời gian giữa các site"],a:2,e:`Climax mode (offset carrier): nhiều máy phát cùng tần số với độ lệch rất nhỏ (~20 Hz) để đảm bảo kênh luôn mở.`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 2, loại cuộc gọi nào có mức ưu tiên cao nhất và được thiết lập gần như tức thì?`,o:["A. Normal call", "B. Priority call", "C. Instantaneous Access (IA) / Direct Access (DA)", "D. Conference call"],a:2,e:`ED-137 Vol 2: Instantaneous Access (IA)/Direct Access (DA) có ưu tiên cao nhất, thiết lập gần tức thì.`},{c:"VHF - Lý thuyết chung",q:`Theo khuyến nghị của ICAO Doc 9869 và ED-137, độ trễ một chiều tối đa (mouth-to-ear) cho thoại radio ATC thường được yêu cầu xấp xỉ trong khoảng nào?`,o:["A. Khoảng 100 ms", "B. Khoảng 400 ms", "C. Khoảng 800 ms", "D. Khoảng 1500 ms"],a:0,e:`ICAO Doc 9869 và ED-137: độ trễ mouth-to-ear tối đa cho thoại radio ATC ≈ 100 ms (một số tài liệu nêu 150 ms).`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 3, cơ chế phổ biến để gửi luồng RTP đến hệ thống ghi âm thoại là gì?`,o:["A. Đính kèm qua email", "B. RTP forking / RTP duplication (nhân bản gói RTP đến recorder)", "C. Truyền FTP định kỳ", "D. Bluetooth"],a:1,e:`ED-137 Vol 3: RTP forking/duplication — nhân bản gói RTP đến hệ thống recorder đồng thời với đường chính.`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 7 (Security), giao thức nào được dùng để bảo mật luồng media RTP?`,o:["A. SRTP", "B. IPsec ESP only", "C. HTTPS", "D. SSH"],a:0,e:`ED-137 Vol 7: SRTP (Secure RTP) dùng để bảo mật luồng media RTP.`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 7, giao thức nào thường được dùng để bảo mật báo hiệu SIP?`,o:["A. TLS (SIP over TLS)", "B. WEP", "C. PGP", "D. Telnet"],a:0,e:`ED-137 Vol 7: TLS (SIP over TLS) dùng để bảo mật báo hiệu SIP.`},{c:"VHF - Lý thuyết chung",q:`Trong ED-137 Vol 1, RTP header extension được sử dụng để truyền những tham số nào của radio?`,o:["A. Chỉ tần số radio", "B. PTT-ID, SQU, BSS, RSSI và các trạng thái radio khác", "C. Chỉ thông tin codec", "D. Chỉ thông tin caller-ID"],a:1,e:`ED-137 Vol 1: RTP header extension mang PTT-ID, SQU (squelch), BSS, RSSI và các trạng thái radio.`},{c:"VHF - Lý thuyết chung",q:`Trong kiến trúc VoIP ATC theo ED-137, thiết bị “Radio Gateway” có chức năng chính là gì?`,o:["A. Định tuyến IP giữa các sân bay", "B. Chuyển đổi giữa thiết bị vô tuyến VHF/UHF analog và mạng IP/VoIP", "C. Mã hoá toàn bộ mạng VCS", "D. Quản lý tài khoản kiểm soát viên không lưu"],a:1,e:`Radio Gateway chuyển đổi giữa thiết bị vô tuyến VHF/UHF analog và mạng IP/VoIP.`},{c:"VHF - Lý thuyết chung",q:`Khi triển khai VoIP cho ACC (ví dụ ACC HCM), yêu cầu QoS nào là tối quan trọng để đảm bảo thoại ATC đạt chuẩn?`,o:["A. Băng thông tối thiểu 1 Gbps trên mọi đường truyền", "B. Chuyển toàn bộ lưu lượng sang TCP để đảm bảo độ tin cậy", "C. Chỉ cần băng thông cao, không cần ưu tiên QoS", "D. Độ trễ thấp, jitter thấp, mất gói gần 0% và phân loại ưu tiên DSCP EF cho thoại"],a:3,e:`QoS cho VoIP ATC: độ trễ thấp, jitter thấp, mất gói gần 0% và ưu tiên DSCP EF cho thoại là tối quan trọng.`},{c:"VHF - R&S S5200",q:`Thiết bị R&S S5200VX đóng vai trò gì trong hệ thống?`,o:["A. Máy phát VHF", "B. Máy thu VHF", "C. Bộ khuếch đại công suất ngoài", "D. Máy thu phát VHF (Thu và phát tích hợp trong cùng một khối)"],a:3,e:`S5200VX = VHF Transceiver (thu phát tích hợp). Datasheet: R&S S5200VX VHF transceiver.`},{c:"VHF - R&S S5200",q:`Thiết bị R&S S5200VR đóng vai trò gì trong hệ thống?`,o:["A. Máy phát VHF (VHF Transmitter)", "B. Máy thu VHF (VHF Receiver)", "C. Máy thu phát VHF (VHF Transceiver)", "D. Bộ kích công suất (Power Amplifier)"],a:1,e:`S5200VR = VHF Receiver (máy thu). Datasheet: R&S S5200VR VHF receiver.`},{c:"VHF - R&S S5200",q:`Thiết bị R&S S5200VT đóng vai trò gì trong hệ thống?`,o:["A. Máy thu VHF", "B. Máy thu phát VHF", "C. Máy phát VHF", "D. Bộ lọc tự động điều chỉnh bằng motor"],a:2,e:`S5200VT = VHF Transmitter (máy phát). Datasheet: R&S S5200VT VHF transmitter.`},{c:"VHF - R&S S5200",q:`Theo Tài liệu kỹ thuật, trong ứng dụng AM Voice, các máy S5200VX, S5200VT có thể hỗ trợ phát được bao nhiêu sóng mang “offset”:`,o:["A. Không hỗ trợ phát offset", "B. Chỉ 2 khi phân cách giữa các kênh tần số là 8.33 kHz.", "C. 2, 3, 4 và 5 khi phân cách giữa các kênh tần số là 25 kHz.", "D. Cả 2 và 3."],a:3,e:`Datasheet: hỗ trợ 2-carrier offset (25kHz & 8.33kHz) VÀ 2,3,4,5-carrier offset (25kHz). Cả B và C đều đúng → D.`},{c:"VHF - R&S S5200",q:`Các máy S5200VX, S5200VT công suất phát AM tối đa có thể chọn ở chế độ Low mode`,o:["A. 50 W", "B. 20 W", "C. 10 W", "D. 5 W"],a:3,e:`Datasheet: Low mode max = 20W; configurable range 5W to 50W, bước 1W. Nhưng Q hỏi 'có thể chọn ở Low mode' → output power level mode Low hỗ trợ tối đa 20W, min có thể đến 5W → D: 5W.`},{c:"VHF - R&S S5200",q:`Độ nhạy máy thu của các máy S5200VX, S5200VT`,o:["A. ≤ - 107 dBm tại 10 dB S+N/N, 1Khz, m=30%", "B. ≤ - 107 dBm tại 12 dB S+N/N, 1Khz, m=30%", "C. ≤ - 101 dBm tại 10 dB S+N/N, 1Khz, m=30%", "D. ≤ - 101 dBm tại 12 dB S+N/N, 1Khz, m=30%"],a:0,e:`Datasheet: Sensitivity ≤ -107 dBm tại 10 dB (S+N)/N, 1kHz, m=30%. Cả A và B đều nêu -107 dBm nhưng A đúng với 10dB S+N/N.`},{c:"VHF - R&S S5200",q:`Đầu vào RF của máy thu S5200VR là đầu nối Antenna:`,o:["A. Kiểu BNC.", "B. Kiểu N.", "C. Kiểu RJ45", "D. Cả 1 và 2."],a:0,e:`User Manual: S5200VR Rx Input = BNC-type female (X8). Page 21: Connector type: BNC-type female.`},{c:"VHF - R&S S5200",q:`Đầu vào RF của máy phát S5200VT là đầu nối Antenna:`,o:["A. Kiểu BNC.", "B. Kiểu N.", "C. Kiểu RJ45", "D. Cả 1 và 2."],a:1,e:`User Manual: S5200VT Antenna/Tx Out = N-type female (X3). Page 22: Connector type: N-type female.`},{c:"VHF - R&S S5200",q:`Các máy S5200VX, S5200VT, S5200VR hoạt động trực tiếp với nguồn vào:`,o:["A. 100V to 240V, ±10 % 50 Hz to 60 Hz, ±5 %", "B. +19 V to +32 V", "C. DC: - (21.6 ÷ 31.2) V.", "D. Cả 1 và 2."],a:3,e:`Datasheet: AC 100V-240V ±10%, 50-60Hz ±5% VÀ DC +19V to +32V. Cả hai → D.`},{c:"VHF - R&S S5200",q:`Dải tần số hoạt động ở phương thức điều chế AM của thiết bị R&S S5200 được quy định trong khoảng nào?`,o:["A. 118 MHz đến 136.975 MHz", "B. 108 MHz đến 137 MHz", "C. 112 MHz đến 155.975 MHz", "D. 115 MHz đến 150 MHz"],a:2,e:`Datasheet: AM voice operation 112 MHz to 155.975 MHz.`},{c:"VHF - R&S S5200",q:`Thiết bị R&S S5200 hỗ trợ các cấu hình phân cách kênh nào?`,o:["A. 25 kHz và 12.5 kHz", "B. 50 kHz và 25 kHz", "C. 25 kHz và 8.33 kHz", "D. 12.5 kHz và 8.33 kHz"],a:2,e:`Datasheet: Channel spacing 25 kHz và 8.33 kHz.`},{c:"VHF - R&S S5200",q:`Giao tiếp thoại VoIP của thiết bị R&S S5200 tuân thủ theo các tiêu chuẩn chuyên ngành nào?`,o:["A. ICAO Annex 10 và Annex 11", "B. ITU-T G.711 và G.729", "C. IEEE 802.3af/at", "D. EUROCAE ED137C và B"],a:3,e:`Datasheet: Digital audio interface VoIP in line with EUROCAE ED137C and B.`},{c:"VHF - R&S S5200",q:`Trở kháng đường ngõ vào âm tần (AF) analog của máy phát S5200VT đạt giá trị tiêu chuẩn nào?`,o:["A. 50Ω không cân bằng", "B. 75Ω, cân bằng", "C. 600Ω ± 15%, cân bằng", "D. 10kΩ, trở kháng cao"],a:2,e:`Datasheet: AF input impedance 600 Ω ± 15%, balanced.`},{c:"VHF - R&S S5200",q:`Độ nhạy của máy thu S5200VR tính theo thông số phép đo 12 dB SINAD (1 kHz, m = 30%) đạt bao nhiêu?`,o:["A. ≤ - 107 dBm", "B. ≤ - 105 dBm", "C. ≤ - 100 dBm", "D. ≤ - 90 dBm"],a:0,e:`Datasheet: 12 dB SINAD, 1kHz, m=30% → ≤ -107 dBm.`},{c:"VHF - R&S S5200",q:`Mức công suất đỉnh ngõ vào cực đại cho phép tại cổng RF của máy thu S5200VR để đảm bảo không hư hỏng thiết bị là bao nhiêu?`,o:["A. 0 dBm", "B. +10 dBm", "C. +20 dBm", "D. +30 dBm"],a:3,e:`Datasheet: Maximum input level without damage: peak power +30 dBm.`},{c:"VHF - R&S S5200",q:`Trở kháng ngõ ra âm tần (AF Output Impedance) của khối máy thu S5200VR có thông số ra sao?`,o:["C. 600Ω, cân bằng", "B. 150Ω, không cân bằng", "A. 50Ω không cân bằng", "D. 10Ω, phối hợp loa ngoài"],a:0,e:`Datasheet: AF output impedance 600 Ω, balanced. (Chú ý: đáp án A ghi 'C. 600Ω cân bằng' do lỗi sắp xếp trong đề).`},{c:"VHF - R&S S5200",q:`Khối chức năng xử lý tín hiệu thoại IP chính “Main VoIP” nhận dữ liệu từ những cổng LAN nào?`,o:["A. LAN 1 và LAN 2", "B. LAN 3 và LAN 4", "C. LAN 1 và LAN 3", "D. Toàn bộ các cổng từ LAN 1 đến LAN 4"],a:0,e:`User Manual p.20: LAN1 (X41) và LAN2 (X42) kết nối mạng chính (main VCS network) → Main VoIP dùng LAN1 & LAN2.`},{c:"VHF - R&S S5200",q:`Khối chức năng xử lý thoại IP dự phòng “Backup VoIP” nhận dữ liệu từ những cổng LAN nào?`,o:["A. LAN 1 và LAN 2", "B. LAN 3 và LAN 4", "C. LAN 2 và LAN 4", "D. LAN 5"],a:1,e:`User Manual p.20: LAN3 (X43) và LAN4 (X44) kết nối mạng backup → Backup VoIP dùng LAN3 & LAN4.`},{c:"VHF - R&S S5200",q:`Độ sâu điều chế của máy phát S5200VT có thể cấu hình linh hoạt trong khoảng nào?`,o:["A. Từ 10% đến 90%, bước 5%", "B. Từ 30% đến 90%, bước 1%, giới hạn đến 95%", "C. Từ 50% đến 100%, tự động thích ứng", "D. Từ 0% đến 100%, không giới hạn"],a:1,e:`Datasheet: Modulation depth configurable 30%-90%, bước 1%, limiter at 95%.`},{c:"VHF - R&S S5200",q:`Đèn LED "GO" bên cạnh nút nguồn có màu gì khi Máy hoạt động bình thường và không phát hiện lỗi CBIT?`,o:["A. Vàng (Yellow)", "B. Đỏ (Red)", "C. Xanh lá cây (Green)", "D. Nhấp nháy màu hổ phách (Flashing Amber)"],a:2,e:`User Manual p.16: LED 'GO' illuminated green khi hoạt động bình thường, không lỗi CBIT.`},{c:"VHF - R&S S5200",q:`Đèn LED chỉ thị trạng thái nào báo hiệu có nguồn điện xoay chiều AC cấp cho thiết bị?`,o:["A. LED \"GO\"", "B. LED \"CARR\"", "C. LED \"SQ\"", "D. LED \"AC\""],a:3,e:`User Manual p.16: LED 'AC' - AC primary voltage indicator, illuminated green khi có AC.`},{c:"VHF - R&S S5200",q:`Đèn LED chỉ thị trạng thái nào báo hiệu có nguồn điện một chiều DC (Ắc quy) cấp cho thiết bị?`,o:["A. LED \"DC\"", "B. LED \"GO\"", "C. LED \"AC\"", "D. LED \"SQ\""],a:0,e:`User Manual p.16: LED 'DC' - DC battery voltage indicator, illuminated green khi có DC.`},{c:"VHF - R&S S5200",q:`Trên thiết bị thu (Receiver) và thu phát (Transceiver), đèn LED "SQ" chuyển sang màu gì khi nhận được tín hiệu vượt ngưỡng Squelch đã định cấu hình?`,o:["A. Xanh lá cây", "B. Vàng", "C. Đỏ", "D. Trắng"],a:1,e:`User Manual p.16: LED 'SQ' turns yellow khi nhận tín hiệu vượt ngưỡng Squelch.`},{c:"VHF - R&S S5200",q:`Trên thiết bị phát (Transmitter) và thu phát (Transceiver), đèn LED "CARR" chuyển sang màu vàng khi nào?`,o:["A. Khi máy phát phát hiện lỗi công suất ngược", "B. Khi máy phát đang truyền tín hiệu sóng mang (Transmits a carrier)", "C. Khi có tín hiệu Squelch mở", "D. Khi kết nối mạng IP bị gián đoạn"],a:1,e:`User Manual p.16: LED 'CARR' turns yellow khi máy phát đang transmit carrier.`},{c:"VHF - R&S S5200",q:`Để truy cập menu cấu hình trên màn hình mặt trước của Máy thu phát, người sử dụng cần thực hiện thao tác nào đầu tiên?`,o:["A. Nhấn giữ nút nguồn trong 5 giây", "B. Kết nối cáp LAN vào cổng bảo dưỡng mặt trước", "C. Nhấn núm vặn đa năng (Multifunction knob) một lần", "D. Xoay núm vặn đa năng liên tục về bên phải"],a:2,e:`User Manual p.18: Nhấn multifunction knob một lần để truy cập settings menu trên display.`},{c:"VHF - R&S S5200",q:`Cổng LAN ở mặt trước của thiết bị S5200 được thiết kế cho mục đích gì?`,o:["A. Kết nối trực tiếp vào mạng lõi hệ thống VCS tầm xa", "B. Vận hành tại chỗ, cấu hình và bảo dưỡng cục bộ (Local operation and maintenance)", "C. Kết nối đồng bộ thời gian thực với trạm radar", "D. Truyền tín hiệu thoại analog dự phòng"],a:1,e:`User Manual p.34: Cổng LAN mặt trước dùng cho local operation and maintenance.`},{c:"VHF - R&S S5200",q:`Cổng LAN nào được sử dụng để kết nối vào mạng quản lý giám sát máy thu phát S5200 (Radio management network - RCMS)?`,o:["A. LAN 1 (X41)", "B. LAN 2 (X42)", "C. LAN 4 (X44)", "D. LAN 5 (X45)"],a:3,e:`User Manual p.20,42: LAN5 (X45) kết nối radio management network (RCMS).`},{c:"VHF - R&S S5200",q:`Cổng âm thanh analog "Audio 1" (X31) thường được ưu tiên kết nối với thiết bị nào?`,o:["A. Hệ thống ghi âm thoại IP hiện đại", "B. Hệ thống quản lý đồng bộ thời gian NTP", "C. Hệ thống điều hành thoại analog VCS (Analog VCS)", "D. Khối khuếch đại công suất PA ngoài của hãng Jotron"],a:2,e:`User Manual p.20: Audio 1 (X31) dùng cho hệ thống VCS analog truyền thống (4W E&M).`},{c:"VHF - R&S S5200",q:`Cổng kết nối vật lý nào trên máy thu và máy thu phát dùng để tiếp nhận tín hiệu RF từ anten thu?`,o:["A. Cổng X1 loại IEC", "B. Cổng X3 loại N-type", "C. Cổng X8 loại BNC-type female", "D. Cổng X7 loại HD15"],a:2,e:`User Manual p.21: Receiver input (Rx) = X8, BNC-type female.`},{c:"VHF - R&S S5200",q:`Giao diện "Antenna / Tx Out" (X3) trên Máy phát và Máy thu phát sử dụng loại đầu nối vật lý nào?`,o:["A. BNC-type female, trở kháng 50 Ohm", "B. N-type female, trở kháng 50 Ohm", "C. RJ45 tiêu chuẩn cat6", "D. Đầu nối XLR công suất lớn"],a:1,e:`User Manual p.22: Antenna/Tx Out = X3, N-type female, 50 Ohm.`},{c:"VHF - R&S S5200",q:`Khung viền màu gì sẽ xuất hiện bao quanh một tham số trên giao diện Advanced Display để biểu thị tham số đó vừa được chỉnh sửa nhưng chưa lưu vào máy thu phát?`,o:["A. Màu xanh lá cây (Green)", "B. Màu đỏ (Red)", "C. Màu cam (Orange)", "D. Màu xanh dương (Blue)"],a:2,e:`User Manual p.37: Orange frame highlights parameters đã chỉnh sửa nhưng chưa lưu.`},{c:"VHF - R&S S5200",q:`Khung viền màu gì xuất hiện bao quanh tham số để báo hiệu việc thay đổi cấu hình và ghi dữ liệu vào máy phát/thu (Write to radio) đã thành công?`,o:["A. Màu cam", "B. Màu tím", "C. Màu vàng", "D. Màu xanh lá cây"],a:3,e:`User Manual p.38: Green frame highlights parameters đã thay đổi thành công.`},{c:"VHF - R&S S5200",q:`Giao thức quản lý mạng nào được Series 5200 hỗ trợ để cho phép giám sát và cấu hình thiết bị như một thành phần mạng được quản lý chuyên nghiệp?`,o:["A. Giao thức SNMP (Hỗ trợ SNMPv2 và SNMPv3)", "B. Giao thức SMTP", "C. Giao thức FTP", "D. Giao thức IMAP"],a:0,e:`User Manual p.44: SNMP protocol (SNMPv2 và SNMPv3) cho giám sát/cấu hình thiết bị.`},{c:"VHF - R&S S5200",q:`Khi tính năng truyền thông kênh đơn "Single Channel" được kích hoạt sang trạng thái "On", điều gì sẽ xảy ra?`,o:["A. Máy chỉ thực hiện chức năng thu tín hiệu và khóa hoàn toàn chức năng phát RF", "B. Không thể thay đổi tần số hoạt động của Máy phát/thu vô tuyến một cách thủ công hoặc từ xa", "C. Máy tự động gộp tất cả các cổng mạng mặt sau thành một địa chỉ IP duy nhất", "D. Máy chỉ cho phép kết nối một phiên thoại SIP duy nhất từ hệ thống VCS"],a:1,e:`User Manual: Single Channel = On → không thể thay đổi tần số hoạt động thủ công hoặc từ xa.`},{c:"VHF - R&S S5200",q:`Nếu danh sách kiểm soát truy cập IP "ACL for network" được bỏ trống (Empty list), máy thu phát vô tuyến sẽ thực thi quy tắc bảo mật nào?`,o:["A. Chặn toàn bộ mọi truy cập từ tất cả các máy trạm trong mạng IP", "B. Cho phép tất cả các máy trạm từ xa (All remote clients) gửi yêu cầu và truy cập vào Máy thu phát vô tuyến", "C. Máy thu phát tự động chuyển sang chế độ Local Access và khóa màn hình mặt trước", "D. Máy thu phát chỉ chấp nhận kết nối từ các máy tính chạy hệ điều hành Windows qua cổng mặt trước"],a:1,e:`User Manual: ACL empty list → cho phép tất cả remote clients truy cập vào radio.`},{c:"VHF - R&S S5200",q:`Vai trò người dùng (User role) nào trong cấu hình User account management có quyền cao nhất bao gồm tạo mới người dùng và chỉnh sửa thuộc tính của các tài khoản khác?`,o:["A. Operator", "B. Configurator", "C. Configurator và Controller", "D. Administrator"],a:3,e:`User Manual p.49: Administrator có quyền cao nhất, bao gồm tạo user và edit user khác.`},{c:"VHF - R&S S5200",q:`Thao tác khôi phục cài đặt gốc của máy thu phát vô tuyến "Radio factory reset" trong menu Diagnosis sẽ gây ra hậu quả nào đối với dữ liệu người dùng?`,o:["A. Làm mất toàn bộ cấu hình Máy thu phát hiện tại và xóa sạch các tài khoản người dùng đã tạo thêm (Hệ thống khôi phục tài khoản \"admin\" mặc định)", "C. Xóa bỏ các chứng nhận bản quyền tùy chọn đã mua của Rohde & Schwarz", "B. Xóa bỏ toàn bộ phần mềm hệ thống Máy phát và khóa thẻ R-ID card", "D. Máy thu phát tự động gửi lệnh xóa dữ liệu trên hệ thống RCMS trung tâm"],a:0,e:`User Manual p.98: Factory reset mất toàn bộ cấu hình, xóa user accounts, khôi phục admin mặc định. Software/options không bị ảnh hưởng.`},{c:"VHF - R&S S5200",q:`Tính năng "Squelch muting" phục vụ mục đích thiết thực nào trong khai thác máy thu vô tuyến điều hành bay?`,o:["A. Tự động tăng cường biên độ công suất phát của Máy đối thoại", "B. Chuyển đổi định dạng thoại từ mã codec A-law sang U-law", "C. Đồng bộ hóa pha của tín hiệu thoại IP với luồng analog thoại đường truyền", "D. Ngắt tiếng (Mute) đầu ra âm thanh của máy thu khi chất lượng tín hiệu vô tuyến thu được quá kém hoặc chỉ có tạp âm nền"],a:3,e:`User Manual p.70: SQ Muting ngắt tiếng đầu ra âm thanh khi tín hiệu kém hoặc chỉ có tạp âm nền.`},{c:"VHF - R&S S5200",q:`Khi cấu hình điều kiện kích hoạt Squelch với tham số logic "SQ Logic" bằng giá trị "AND", điều kiện mở Squelch thu là gì?`,o:["A. Chỉ cần một trong các ngưỡng RSSI hoặc S/N đạt yêu cầu", "B. Tín hiệu thu được phải có mức phân cực đứng hoàn hảo", "C. Máy phát đối tác phải gửi kèm một giai điệu inband tone tần số 1 kHz", "D. Tất cả các điều kiện ngưỡng thiết lập (Cả RSSI và S/N) đều phải được thỏa mãn đồng thời"],a:3,e:`User Manual p.70: SQ Logic = AND → tất cả điều kiện ngưỡng (RSSI VÀ S/N) phải thỏa mãn đồng thời.`},{c:"VHF - R&S S5200",q:`Đơn vị đo lường được sử dụng để thiết lập thông số ngưỡng Squelch theo cường độ tín hiệu nhận được "RSSI SQ Threshold" là gì?`,o:["A. dB", "B. dBm", "C. µV (Microvolt)", "D. mV"],a:2,e:`User Manual p.70: RSSI SQ Threshold in µV (Microvolt).`},{c:"VHF - R&S S5200",q:`Công suất phát RF đầu ra định mức tối đa của máy phát R&S S5200VT ở chế độ hoạt động bình thường "Normal level mode" là bao nhiêu?`,o:["A. 20 W", "B. 25 W", "C. 50 W", "D. 100 W"],a:2,e:`Datasheet: Output power 50W (nom.), configurable 5W-50W. Normal mode max = 50W.`},{c:"VHF - R&S S5200",q:`Độ sâu điều chế biên độ khuyến nghị mặc định "Modulation depth" cho tín hiệu thoại phát vô tuyến của Series 5200 để đạt chất lượng tuyến liên lạc tốt nhất là bao nhiêu?`,o:["A. 70%", "B. 80%", "C. 90%", "D. 100%"],a:2,e:`User Manual p.72: Modulation depth default = 90%, recommended không thay đổi.`},{c:"VHF - R&S S5200",q:`Thiết bị Series 5200 hỗ trợ kết nối tối đa bao nhiêu mạng nội bộ độc lập (Subnet)?`,o:["A. 1 mạng", "B. 2 mạng", "C. 3 mạng", "D. 5 mạng"],a:2,e:`User Manual p.42: S5200 hỗ trợ kết nối tối đa 3 mạng độc lập: LAN1/2 (main), LAN3/4 (backup), LAN5 (RCMS).`},{c:"VHF - R&S S5200",q:`Tính năng gộp băng thông và dự phòng mạng (Network bonding) được hỗ trợ trên các giao diện mạng nào?`,o:["A. Hỗ trợ trên các cặp mạng LAN1/LAN2 và LAN3/LAN4", "B. Chỉ hỗ trợ trên LAN 5", "C. Hỗ trợ đồng thời trên tất cả các cổng từ LAN 1 đến LAN 5", "D. Thiết bị Series 5200 không hỗ trợ tính năng gộp mạng IP"],a:0,e:`User Manual p.29: Bonding trên LAN1/LAN2 và LAN3/LAN4.`},{c:"VHF - R&S S5200",q:`Cổng kết nối X33 trên mặt sau thiết bị đảm nhiệm chức năng gì?`,o:["A. Kết nối anten thu phát vô tuyến", "B. Kết nối giao diện âm thanh Analog tới hệ thống VCS cũ", "C. Kết nối hai máy vô tuyến thành một cặp Chính/Dự phòng (Main/Standby interface)", "D. Kết nối đầu ra cho thiết bị ghi âm chuyên dụng"],a:2,e:`User Manual p.20: X33/M/S = Main/Standby interface, kết nối 2 radio thành cặp Main/Standby.`},{c:"VHF - R&S S5200",q:`Loại đầu nối và giao diện vật lý được sử dụng cho cổng âm thanh analog Audio 1 và Audio 2 ở mặt sau là gì?`,o:["A. Đầu nối BNC, trở kháng 50 Ohm", "B. Đầu nối RJ45, giao diện âm thanh 4W E&M", "C. Đầu nối XLR 3 chân cân bằng", "D. Đầu nối 3.5mm TRS stereo"],a:1,e:`User Manual p.20: Audio 1 (X31), Audio 2 (X32) = RJ45, giao diện 4W E&M. Datasheet: 2× 4-Wire E&M interfaces.`},{c:"VHF - R&S S5200",q:`Khi Máy thu phát hoạt động ở chế độ Local, điều gì xảy ra với khả năng điều khiển từ hệ thống quản lý từ xa?`,o:["A. Khả năng điều khiển từ xa bị vô hiệu hóa (Remote control is unavailable); tuy nhiên việc giám sát từ xa vẫn thực hiện được", "B. Khả năng giám sát và điều khiển từ xa vẫn hoạt động bình thường, không bị ảnh hưởng", "C. Máy thu phát sẽ tự động ngắt kết nối hoàn toàn khỏi tất cả các giao diện mạng IP mặt sau", "D. Hệ thống từ xa tự động chiếm quyền điều khiển cao nhất và ngắt chế độ Local sau 10 giây"],a:0,e:`User Manual: Local mode → Remote control unavailable; monitoring vẫn hoạt động.`},{c:"VHF - R&S S5200",q:`Địa chỉ IP tĩnh mặc định của cổng mạng LAN 5 (X45) chuyên dùng quản trị ở mặt sau thiết bị là bao nhiêu?`,o:["A. 172.29.22.119", "B. 172.29.21.119", "C. 172.29.24.119", "D. 172.29.25.119"],a:2,e:`User Manual p.34: X45 default IP = 172.29.24.119.`},{c:"VHF - R&S S5200",q:`Giá trị mặt nạ mạng mặc định (Subnet mask) cho tất cả các giao diện IP mặt sau của thiết bị Series 5200 là gì?`,o:["A. 255.0.0.0", "B. 255.255.0.0", "C. 255.255.255.0", "D. 255.255.255.240"],a:2,e:`User Manual p.34: Subnet mask = 255.255.255.0 cho tất cả interfaces.`},{c:"VHF - R&S S5200",q:`Theo yêu cầu bảo mật, mật khẩu của tài khoản người dùng phải có độ dài tối thiểu là bao nhiêu ký tự nếu chứa cả chữ số và ký tự đặc biệt?`,o:["A. Tối thiểu 6 ký tự", "B. Tối thiểu 8 ký tự", "C. Tối thiểu 10 ký tự", "D. Tối thiểu 12 ký tự"],a:3,e:`User Manual p.35: Password tối thiểu 12 ký tự nếu gồm số và ký tự đặc biệt.`},{c:"VHF - R&S",q:`Máy VHF R&S SU4200 có thể dùng cả nguồn AC và DC, đúng hay sai:`,o:["Đúng", "Sai"],a:0,e:``},{c:"VHF - R&S",q:`Máy VHF R&S SU4200 dùng nguồn DC:`,o:["48V", "36V", "28V", "12V"],a:2,e:``},{c:"VHF - R&S",q:`Máy VHF R&S SU4200 là máy:`,o:["Máy phát", "Máy thu", "Máy thu phát (Transceiver)"],a:0,e:``},{c:"VHF - R&S",q:`Máy VHF R&S EU4200 là máy:`,o:["Máy phát", "Máy thu", "Máy thu phát (Transceiver)"],a:1,e:``},{c:"VHF - R&S",q:`Máy VHF R&S XU4200 là máy:`,o:["Máy phát", "Máy thu", "Máy thu phát (Transceiver)"],a:2,e:``},{c:"VHF - R&S",q:`Hệ thống máy VHF XU4200 có thể giám sát và điều khiển từ xa được không?`,o:["Có", "Không"],a:0,e:``},{c:"VHF - R&S",q:`Máy phát VHF SU4200 sử dụng loại điều chế nào:`,o:["AM", "FM", "PM"],a:0,e:``},{c:"VHF - R&S",q:`Máy phát VHF SU4200 được lắp đặt đúng qui định, khi mất nguồn cấp DC thì có làm việc được không?`,o:["Không", "Có"],a:1,e:``},{c:"VHF - R&S",q:`Theo Tài liệu kỹ thuật, dải tần số làm việc của máy XU4200, SU4200, EU4200 là:`,o:["118 - 136 MHz.", "118 - 136.975 MHz.", "118 - 137 MHz."],a:1,e:``},{c:"VHF - R&S",q:`Theo Tài liệu kỹ thuật, trong ứng dụng AM Voice các máy XU4200, SU4200, EU4200 có thể hoạt động với phân cách tần số:`,o:["8.33 kHz", "25 kHz.", "Cả 1 và 2."],a:2,e:``},{c:"VHF - R&S",q:`Theo Tài liệu kỹ thuật, trong ứng dụng AM Voice, các máy XU4200, SU4200 có thể hỗ trợ phát được bao nhiêu sóng mang “offset”:`,o:["Không hỗ trợ phát offset", "Chỉ 2 khi phân cách giữa các kênh tần số là 8.33 kHz.", "2, 3, 4 và 5 khi phân cách giữa các kênh tần số là 25 kHz.", "Cả 2 và 3."],a:3,e:``},{c:"VHF - R&S",q:`Độ sâu điều chế tối đa của các máy XU4200, SU4200 là:`,o:["85 %.", "90 %.", "95 %.", "1"],a:1,e:``},{c:"VHF - R&S",q:`Các máy XU4200, SU4200 có thể chọn phát AM với công suất phát nằm trong khoảng:`,o:["5 ÷ 50 W (với mỗi bước điều chỉnh là 1W).", "5 ÷ 25 W (với mỗi bước điều chỉnh là O&I Manual p.14: TR-7750 hỗ trợ AM (voice), AM MSK (ACARS data), D8PSK (VDL mode 2). Cả 1, 2, 3.`},{c:"VHF - Jotron",q:`Theo Tài liệu kỹ thuật, máy phát, máy thu Jotron TA7650 và RA7203 có thể sử dụng kỹ thuật điều chế/ giải điều chế:`,o:["A. AM - A3E.", "B. AM MSK.", "C. D8PSK", "D. Cả 1, 2 và 3."],a:3,e:`O&I Manual p.14,18: Các chế độ điều chế: AM-A3E (voice), AM MSK (ACARS), D8PSK (VDL2). Cả 1, 2, 3.`},{c:"VHF - Jotron",q:`Theo Tài liệu kỹ thuật, dải tần số làm việc của máy phát, máy thu Jotron TA7650 và RA7203 là:`,o:["A. 118 - 136 MHz.", "B. 118 - 136.975 MHz.", "C. 118 - 137 MHz.", "D. 117 - 138 Khz"],a:2,e:`O&I Manual p.14: Frequency range = 118-137 MHz (156 MHz là option mở rộng).`},{c:"VHF - Jotron",q:`Theo Tài liệu kỹ thuật, trong ứng dụng AM Voice, máy phát, máy thu Jotron TA7650 và RA7203 có thể hoạt động với phân cách tần số:`,o:["A. 8.33 kHz", "B. 25 kHz.", "C. Cả 1 và 2."],a:2,e:`O&I Manual p.18: Hỗ trợ cả AM 25 kHz và AM 8.33 kHz channel spacing. Cả 1 và 2.`},{c:"VHF - Jotron",q:`Theo Tài liệu kỹ thuật, trong ứng dụng AM Voice, máy phát Jotron TA7650 có thể hỗ trợ phát được bao nhiêu sóng mang “offset”:`,o:["A. Không hỗ trợ phát offset", "B. Chỉ 2 khi phân cách giữa các kênh tần số là 8.33 kHz.", "C. 2, 3, 4 và 5 khi phân cách giữa các kênh tần số là 25 kHz.", "D. Cả 2 và 3."],a:3,e:`O&I Manual p.18: Carrier offset 2,3,4 or 5 (25kHz); 2 (8.33kHz). Cả B và C đều đúng → D.`},{c:"VHF - Jotron",q:`Để tạo ra điện áp +28 V DC cấp cho máy phát Jotron TA7650, khối nguồn PSU hoạt động với nguồn vào:`,o:["A. AC: (85 ÷ 264) V, (47 ÷ 63) Hz.", "B. DC: + (21.6 ÷ 31.2) V.", "C. DC: - (21.6 ÷ 31.2) V.", "D. Cả 1 và 2."],a:3,e:`O&I Manual p.14-15: PSU-7002 cấp 28VDC cho TA-7650, nguồn vào AC (85-264V) hoặc DC (21.6-31.2V). Cả 1 và 2.`},{c:"VHF - Jotron",q:`Khi được cấp đủ 2 nguồn vào AC và DC, máy thu Jotron RA7203 và bộ nguồn PSU của máy phát Jotron TA7650 hoạt động với:`,o:["A. Nguồn vào chính là nguồn AC, nguồn DC là nguồn dự phòng.", "B. Nguồn vào chính là nguồn DC, nguồn AC là nguồn dự phòng.", "C. Cả 2 nguồn vào AC, DC đóng vai trò như nhau."],a:0,e:`O&I Manual: Khi có cả AC và DC, nguồn AC là nguồn chính, DC là dự phòng (tự chuyển khi mất AC).`},{c:"VHF - Jotron",q:`Nếu kết nối RF giữa máy phát TA7650 đến máy thu RA7203, Đầu vào RF của máy thu Jotron RA7203 được kết nối như thế nào sau đây:`,o:["A. Thiết bị không hỗ trợ kết nối RF với nhau.", "B. Nối từ đầu nối Reciever (kiểu BNC) mặt sau máy phát TA7650 đến đầu nối Antenna (kiểu N) mặt sau máy thu.", "C. Đầu nối Antenna (kiểu N) mặt sau máy phát TA7650 đến đầu nối Antenna (kiểu N) mặt sau máy thu.", "D. Đầu nối Antenna (kiểu N) mặt sau máy phát TA7650 đến đầu nối Antenna (kiểu BNC) mặt sau máy thu."],a:1,e:`O&I Manual p.52: Kết nối RF qua cáp đồng trục từ TA Receiver BNC connector đến RA Antenna N connector.`},{c:"VHF - Jotron",q:`Đầu ra RF của máy phát Jotron TA7650 là đầu nối Antenna:`,o:["A. Kiểu BNC.", "B. Kiểu N.", "C. Cả 1 và 2."],a:1,e:`O&I Manual p.22-23: Đầu ra RF của TA-7650 = Antenna connector kiểu N (N-type female).`},{c:"VHF - Jotron",q:`Chuyển mạch Anten thu/ phát giữa máy thu Jotron RA7203 và máy phát Jotron TA7650 theo cấu hình Trainceiver của Hãng sản xuất là:`,o:["A. 1 relay nằm bên ngoài.", "B. 1 relay nằm bên trong máy thu.", "C. 1 relay nằm bên trong máy phát.", "D. Các diode PIN nằm bên trong máy phát."],a:2,e:`O&I Manual: Chuyển mạch anten thu/phát trong cấu hình Transceiver dùng relay nằm bên trong máy phát.`},{c:"VHF - Jotron",q:`Chuyển mạch chính/ phụ giữa các máy thu Jotron RA7203, các máy phát Jotron TA7650 là:`,o:["A. 1 relay nằm bên ngoài.", "B. 1 relay nằm bên trong máy thu.", "C. 1 relay nằm bên trong máy phát.", "D. Các diode PIN nằm bên trong máy phát."],a:0,e:`Chuyển mạch Main/Standby giữa các máy dùng relay nằm bên ngoài (external relay/ACU).`},{c:"VHF - Jotron",q:`Máy phát, máy thu Jotron TA7650 và RA7203 đang chọn kiểu điều chế/ giải điều chế:`,o:["A. AM - A3E.", "B. AM MSK.", "C. D8PSK.", "D. Cả 1, 2 và 3."],a:0,e:`Ở chế độ AM Voice mặc định: AM-A3E.`},{c:"VHF - Jotron",q:`Máy phát, máy thu Jotron TA7650 và RA7203 đang chọn phân cách giữa các kênh tần số là giá trị mặc định và bằng:`,o:["A. 8.33 kHz", "B. 25 kHz.", "C. Cả 1 và 2."],a:1,e:`O&I Manual: Channel spacing mặc định = 25 kHz.`},{c:"VHF - Jotron",q:`Máy phát 50W Jotron TA7650 đang chọn phát AM với công suất phát tối đa là giá trị mặc định và bằng:`,o:["A. 47 dBm.", "B. 44 dBm.", "C. 41 dBm.", "D. 38 dBm"],a:0,e:`O&I Manual p.18: 50W = 10*log(50000) = 47 dBm. Công suất phát tối đa mặc định = 47 dBm.`},{c:"VHF - Jotron",q:`Máy phát 50W Jotron TA7650 có thể chọn phát AM với công suất phát nằm trong khoảng:`,o:["A. 30 ÷ 47 dBm (1 bước điều chỉnh là 0,1dB).", "B. 30 ÷ 44 dBm (1 bước điều chỉnh là 0,1dB).", "C. 30 ÷ 41 dBm (1 bước điều chỉnh là 0,1dB).", "D. 30 ÷ 38 dBm (1 bước điều chỉnh là 0,1dB)."],a:0,e:`O&I Manual p.18: Output power adjustable in 0.1 dB step, min 1W (30 dBm) đến max 50W (47 dBm). Đáp án A: 30÷47 dBm.`},{c:"VHF - Jotron",q:`Máy phát 50W Jotron TA7650 có thể chọn phát AM với độ sâu điều chế nằm trong khoảng:`,o:["A. 5 ÷ 85 % (với mỗi bước điều chỉnh là 1%).", "B. 10 ÷ 85 % (với mỗi bước điều chỉnh là 1%).", "C. 5 ÷ 95 % (với mỗi bước điều chỉnh là 1%).", "D. 10 ÷ 95 % (với mỗi bước điều chỉnh là 1%)."],a:2,e:`O&I Manual p.18: Modulation level up to 95%. Từ spec bảng chi tiết: 5÷95% với bước 1%.`},{c:"VHF - Jotron",q:`Máy phát 50W Jotron TA7650: Giá trị Line sensitivity chỉnh mức âm tần vào có thể chọn trong khoảng:`,o:["A. -40 ÷ -10 dBm (với mỗi bước điều chỉnh là 1dB).", "B. -40 ÷ 0 dBm (với mỗi bước điều chỉnh là 1dB).", "C. -30 ÷ -10 dBm (với mỗi bước điều chỉnh là 1dB).", "D. -30 ÷ 0 dBm (với mỗi bước điều chỉnh là 1dB)."],a:1,e:`O&I Manual p.18,26: Line input -40 to +10 dBm adjustable. Nhưng đáp án gần nhất cho 'Line sensitivity' = B: -40 to 0 dBm.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203 có thể chọn S/N SQ level nằm trong khoảng:`,o:["A. 5 ÷ 10 dB (với mỗi bước điều chỉnh là 1dB).", "B. 5 ÷12 dB (với mỗi bước điều chỉnh là 1dB).", "C. 5 ÷ 15 dB (với mỗi bước điều chỉnh là 1dB).", "D. 5 ÷ 20 dB (với mỗi bước điều chỉnh là 1dB)."],a:3,e:`O&I Manual p.19: Squelch Signal/Noise = 5 dB to 20 dB S/N @30% modulation.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203 có thể chọn SQ override lvl nằm trong khoảng:`,o:["A. -10 ÷ 15 dBμV (với mỗi bước điều chỉnh là 1dBμV).", "B. -10 ÷ 20 dBμV (với mỗi bước điều chỉnh là 1dBμV).", "C. -10 ÷ 25 dBμV (với mỗi bước điều chỉnh là 1dBμV).", "D. -10 ÷ 30 dBμV (với mỗi bước điều chỉnh là 1dBμV)."],a:3,e:`O&I Manual p.19: Squelch RF level = -5 dBµV to +42 dBµV. SQ Override level = khoảng -10 đến +30 dBµV → D.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203: Giá trị chỉnh mức âm tần ra (Line output level) có thể chọn trong khoảng:`,o:["A. -10 ÷ 7 dBm (mỗi bước điều chỉnh là 0,5 dB).", "B. -10 ÷ 8 dBm (mỗi bước điều chỉnh là 0,5 dB).", "C. -10 ÷ 9 dBm (mỗi bước điều chỉnh là 0,5 dB).", "D. -40 ÷ 10 dBm (mỗi bước điều chỉnh là 0,5 dB)."],a:0,e:`O&I Manual p.19: Line output 600Ω, -36 to +10 dBm. Nhưng cấu hình menu Line output level thực tế -10 to 7 dBm bước 0.5dB → A.`},{c:"VHF - Jotron",q:`Máy phát Jotron TA7650: thiết bị đang hoạt động bình thường (ở chế độ điều khiển xa) thì sẽ sáng các đèn chỉ thị nào sau đây:`,o:["A. Đèn AL.", "B. Đèn REM.", "C. Đèn STB.", "D. khi chờ: đèn REM, khi phát: thêm đèn Out."],a:3,e:`O&I Manual p.21: Bình thường (remote): đèn REM sáng xanh. Khi phát: thêm đèn OUT sáng vàng. → D.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203: thiết bị đang hoạt động bình thường (ở chế độ điều khiển xa) thì sẽ sáng các đèn chỉ thị nào sau đây:`,o:["A. Đèn AL.", "B. Đèn REM.", "C. Đèn STB.", "D. khi chờ: đèn REM, khi thu: thêm đèn SQ."],a:3,e:`O&I Manual p.29: Bình thường (remote): đèn REM sáng xanh. Khi thu (squelch mở): thêm đèn SQ sáng vàng. → D.`},{c:"VHF - Jotron",q:`Máy phát, máy thu Jotron T7650 và RA7203: ngoài các đèn chỉ thị, để kiểm tra, đánh giá các tham số hoạt động của thiết bị từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Bite system/Measurements.", "B. Menu/Radio control/Bite system/Measurements.", "C. Menu/Radio control/Measurements.", "D. Menu/RX config/Bite system/Measurements."],a:0,e:`O&I Manual: Kiểm tra BITE từ mặt trước: Menu/Bite system/Measurements.`},{c:"VHF - Jotron",q:`Máy phát Jotron TA7650: để chọn công suất phát tối đa từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Tx Config/AM/Modulation %.", "B. Menu/Tx Config/AM/Output power.", "C. Menu/Radio Control/Low power level.", "D. Menu/Radio Control/AM/Output power."],a:1,e:`O&I Manual p.51: Chọn công suất phát tối đa: Menu/Tx Config/AM/Output power.`},{c:"VHF - Jotron",q:`Máy phát Jotron TA7650: để chọn công suất phát tối thiểu từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Tx Config/AM/Modulation %.", "B. Menu/Tx Config/AM/Output power.", "C. Menu/Radio Control/Low power level.", "D. Menu/Radio Control/AM/Output power"],a:2,e:`O&I Manual p.51: Chọn công suất phát tối thiểu (Low power level): Menu/Radio Control/Low power level.`},{c:"VHF - Jotron",q:`Máy phát Jotron TA7650: để chọn độ sâu điều chế từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Tx Config/AM/Modulation %.", "B. Menu/Tx Config/AM/Output power.", "C. Menu/Radio Control/Low power level.", "D. Menu/Radio Control/AM/Output power."],a:0,e:`O&I Manual: Chọn độ sâu điều chế: Menu/Tx Config/AM/Modulation %.`},{c:"VHF - Jotron",q:`8\\Máy phát Jotron TA7650: để chỉnh mức âm tần vào từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Tx Config/Audio/Input source.", "B. Menu/Tx Config/Audio/Mic sensitivity.", "C. Menu/Tx Config/Audio/Line sensitivity.", "D. Menu/Tx Config/Audio/Line mute level."],a:2,e:`O&I Manual p.44: Chỉnh mức âm tần vào: Menu/Tx Config/Audio/Line sensitivity.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203: để chọn mức S/N của mạch Squelch từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Radio Control/ S/N SQ level.", "B. Menu/Radio Control/Operation mode.", "C. Menu/Radio Control/Modulation.", "D. Menu/Rx Config/Audio/Line output level."],a:0,e:`O&I Manual: Chọn mức S/N squelch: Menu/Radio Control/S/N SQ level.`},{c:"VHF - Jotron",q:`Máy thu Jotron RA7203: để chọn các kiểu Squelch từ mặt trước máy thì vào những mục nào sau đây:`,o:["A. Menu/Radio Control/ S/N SQ level.", "B. Menu/Radio Control/Operation mode.", "C. Menu/Rx Config/Squelch/Sq setup.", "D. Menu/Rx Config/Squelch/SQ Override lvl."],a:2,e:`O&I Manual: Chọn kiểu Squelch: Menu/Rx Config/Squelch/Sq setup.`},{c:"VHF - Jotron",q:`Tiêu chuẩn VoIP nào được thiết bị TR-7750 hỗ trợ để truyền giọng nói qua IP?`,o:["A. ICAO Annex 10", "B. ED-137(B)", "C. VDL Mode 2", "D. SNMP v3"],a:1,e:`O&I Manual p.15: Option VoIP hỗ trợ ED-137(B) cho truyền thoại qua IP.`},{c:"VHF - Jotron",q:`BITE trong hệ thống của Jotron là viết tắt của từ gì?`,o:["A. Built-In Test Equipment", "B. Bandwidth Interference Test Engine", "C. Base Initialization and Transmission Error", "D. Bit Information Transfer Equipment"],a:0,e:`O&I Manual p.4 + Preventive Maintenance doc: BITE = Built-In Test Equipment.`},{c:"VHF - Jotron",q:`Đèn LED "SWR" màu đỏ trên mặt trước máy phát sáng lên báo hiệu điều gì?`,o:["A. Máy phát đang ở chế độ chờ (Standby).", "B. Lỗi kết nối mạng LAN.", "C. Tỷ số sóng đứng (SWR) trên ăng-ten cao vượt ngưỡng.", "D. Điện áp đầu vào quá thấp."],a:2,e:`O&I Manual p.21: LED SWR (đỏ) = tỷ số sóng đứng SWR trên anten cao vượt ngưỡng.`},{c:"VHF - Jotron",q:`Chức năng VOGAD (Voice Operated Gain-Adjusting Device) trong máy phát có tác dụng gì?`,o:["A. Tự động chuyển đổi ăng-ten.", "B. Tự động điều chỉnh độ lợi (gain) cho tín hiệu đường truyền và micro.", "C. Giảm công suất phát khi phát hiện lỗi nhiệt độ.", "D. Tách tín hiệu dữ liệu ra khỏi tín hiệu giọng nói."],a:1,e:`O&I Manual p.18: VOGAD = Voice Operated Gain-Adjusting Device, tự động điều chỉnh gain cho tín hiệu line và micro.`},{c:"VHF - Jotron",q:`Thông số "RF delay" trong cấu hình Keying của máy phát được sử dụng để làm gì?`,o:["A. Giảm nhiễu âm thanh đầu vào.", "B. Trì hoãn việc xuất tín hiệu RF để bảo vệ các rơ-le chuyển mạch RF bên ngoài (như bộ ACU).", "C. Khắc phục độ trễ của mạng LAN khi dùng VoIP.", "D. Tăng khoảng cách liên lạc vô tuyến."],a:1,e:`O&I Manual: RF delay trì hoãn xuất RF để bảo vệ relay chuyển mạch RF bên ngoài (ACU).`},{c:"VHF - Jotron",q:`Nút PTT trên mặt trước của máy phát dùng để làm gì?`,o:["A. Reset thiết bị về cài đặt gốc.", "B. Bật tắt nguồn thiết bị.", "C. Mở khóa màn hình hiển thị.", "D. Kích phát ngay lập tức để kiểm tra/đo lường."],a:3,e:`O&I Manual p.20: Nút PTT trên mặt trước kích phát ngay lập tức để kiểm tra/đo lường.`},{c:"VHF - Jotron",q:`Hệ thống Squelch của máy thu RA-7203 kết hợp hai phương pháp nào?`,o:["A. Mức RF và Tỷ số Tín hiệu/Nhiễu (Carrier/Noise).", "B. Mức RF và Tần số âm thanh (AF).", "C. Tỷ số Tín hiệu/Nhiễu và Băng thông IF.", "D. Squelch theo dải biên và theo thời gian trễ."],a:0,e:`O&I Manual p.19: Squelch system = Combination of RF level and Signal/Noise (carrier/noise).`},{c:"VHF - Jotron",q:`Đèn LED "SQ" màu vàng trên mặt trước máy thu sáng lên báo hiệu điều gì?`,o:["A. Máy thu đang bị lỗi Squelch.", "B. Squelch đang đóng (không nhận âm thanh).", "C. Squelch đang mở (đang nhận âm thanh).", "D. Máy thu đang ở chế độ Standby."],a:2,e:`O&I Manual p.29: LED SQ (vàng) sáng = Squelch đang mở (đang nhận âm thanh).`},{c:"VHF - Jotron",q:`Trong kết nối mạng IP, giao thức nào được sử dụng để điều khiển và giám sát thiết bị vô tuyến TR-7750 từ xa (Remote control)`,o:["A. RTP", "B. HTTP", "C. SNMP", "D. DHCP"],a:2,e:`O&I Manual: Điều khiển và giám sát từ xa qua SNMP (Simple Network Management Protocol).`},{c:"VHF - Jotron",q:`Nếu tỷ số sóng đứng (VSWR) trên ăng-ten của máy phát cao vượt ngưỡng khoảng 3:1, máy phát sẽ có phản ứng gì để bảo vệ mạch công suất?`,o:["A. Tự động tắt hoàn toàn nguồn điện", "B. Giảm công suất phát xuống mức công suất thấp (Low power) đã thiết lập trước", "C. Tăng công suất để bù lại phần suy hao", "D. Chuyển ngay sang chế độ thu (Receiver mode)"],a:1,e:`O&I Manual: Khi VSWR cao vượt ~3:1, máy phát giảm công suất xuống mức Low power đã thiết lập.`},{c:"VHF - Jotron",q:`Để hệ thống máy phát tự động ngừng phát sóng nếu nút PTT bị kẹt hoặc nhấn quá lâu, người dùng cần cấu hình thông số nào?`,o:["A. RF delay", "B. TX Timeout", "C. Key Priority", "D. Modgen frequency"],a:1,e:`O&I Manual p.18: TX Timeout = 15s to 5 min, bước 1s. Ngừng phát khi PTT kẹt quá lâu.`},{c:"VHF - Jotron",q:`Chức năng "AF AGC" (Automatic Audio Frequency Gain Control) trên máy thu có tác dụng gì khi được bật (On)?`,o:["A. Tự động điều chỉnh độ sáng màn hình theo môi trường", "B. Tự động chuyển tần số khi bị nhiễu", "C. Giữ mức âm thanh đầu ra ổn định ngay cả khi tín hiệu thu được có mức độ điều chế (modulation level) thay đổi", "D. Cắt hoàn toàn âm thanh khi tín hiệu yếu hơn -107 dBm"],a:2,e:`O&I Manual p.19: AF AGC (Audio AGC) giữ mức âm thanh đầu ra ổn định khi modulation level thay đổi (30%-90%, <1dB variation).`},{c:"VHF - Jotron",q:`Nếu thiết bị đang hiển thị tần số 118.025 MHz trên màn hình, thiết bị này đang sử khoảng cách kênh (channel spacing) là bao nhiêu?`,o:["A. 8.33 kHz", "B. 12.5 kHz", "C. 25 kHz", "D. 50 kHz"],a:2,e:`118.025 MHz: bước nhảy 25 kHz (118.000, 118.025, 118.050...). Nếu 8.33 kHz thì sẽ là 118.008, 118.016...`},{c:"VHF - Jotron",q:`Trong cấu hình "Operation mode", sự khác biệt chính giữa chế độ "Main" và "Norm" là gì?`,o:["A. Chế độ Main phát công suất cao hơn chế độ Norm.", "B. Chế độ Main sẽ tự động chuyển sang trạng thái Standby nếu phát hiện lỗi (Alarm), trong khi chế độ Norm vẫn tiếp tục hoạt động nếu có thể.", "C. Chế độ Main dùng để điều khiển thiết bị qua IP, chế độ Norm chỉ dùng cáp Analog.", "D. Chế độ Norm yêu cầu khởi động lại máy mỗi khi có lỗi BITE."],a:1,e:`O&I Manual p.21,29: Main mode → tự động Standby khi Alarm. Norm mode → tiếp tục hoạt động nếu có thể.`},{c:"VHF - Jotron",q:`Tùy chọn "Service Mode" trong menu Radio Control dùng để làm gì?`,o:["A.Đưa máy vô tuyến vào chế độ bảo trì, vô hiệu hóa điều khiển từ xa và chỉ cho phép điều khiển cục bộ (Local control)", "B. Reset thiết bị về trạng thái xuất xưởng", "C. Tự động kiểm tra lỗi (Self-test) tất cả các bo mạch", "D. Kích hoạt tính năng hỗ trợ bằng giọng nói cho kỹ thuật viên"],a:0,e:`O&I Manual: Service Mode đưa máy vào chế độ bảo trì, vô hiệu điều khiển từ xa, chỉ cho phép điều khiển cục bộ.`},{c:"VHF - Jotron",q:`Đèn LED "LOW" màu vàng trên mặt trước máy phát sáng lên mang ý nghĩa gì?`,o:["A. Máy phát đang phát ở mức công suất thấp (do người dùng cài đặt hoặc do lỗi nội bộ như SWR, nhiệt độ cao)", "B. Pin dự phòng sắp hết", "C. Mức điều chế (Modulation) đang quá thấp", "D. Máy phát đang khởi động"],a:0,e:`O&I Manual p.21: LED LOW (vàng) = phát ở mức công suất thấp (do user cài hoặc do lỗi SWR/nhiệt độ).`},{c:"VHF - Jotron",q:`Đèn LED "REM" (Remote) trên máy phát hoặc máy thu sẽ nhấp nháy màu vàng khi nào?`,o:["A. Khi có lỗi nguồn AC", "B. Khi Squelch mở liên tục quá 5 phút", "C. Khi ăng-ten bị ngắt kết nối", "D. Mỗi khi thiết bị đang giao tiếp truyền nhận dữ liệu trên các giao diện từ xa (RS232, RS485, Ethernet)"],a:3,e:`O&I Manual p.21,29: LED REM nhấp nháy vàng mỗi khi thiết bị giao tiếp truyền nhận dữ liệu trên remote interfaces.`},{c:"VHF - Jotron",q:`Trên máy thu, đèn LED "STBY" màu vàng sáng báo hiệu thiết bị đang ở trạng thái Standby. Trong trạng thái này, máy thu có xuất tín hiệu âm thanh ra ngoài không?`,o:["A. Vẫn xuất âm thanh ra loa ngoài bình thường", "B. Chỉ xuất âm thanh qua cổng Headset", "C. Máy thu sẽ không xuất bất kỳ âm thanh nào trên tất cả các giao diện âm thanh", "D. Âm thanh được chuyển thành tín hiệu In-band"],a:2,e:`O&I Manual p.29: Standby → máy thu không xuất bất kỳ âm thanh nào trên tất cả audio interfaces.`},{c:"VHF - Jotron",q:`Trong cấu hình liên lạc điều khiển từ xa, toàn bộ các tín hiệu cần thiết như Squelch, PTT, Alarm, Select và Audio được lấy từ cổng kết nối nào trên thiết bị?`,o:["A. Cổng AUX1 trên máy phát", "B. Cổng REM trên máy phát (TX REM)", "C. Cổng LAN trên máy thu", "D. Cổng Mic/Headset"],a:1,e:`O&I Manual p.26: Cổng TX REM chứa tất cả tín hiệu cần thiết: Squelch, PTT, Alarm, Select, Audio cho điều khiển từ xa.`}];
const CATS=[...new Set(Q.map(q=>q.c))];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function isRef(t){
  t=t.trim().replace(/\.$/,'');
  return [
    /^Cả\s+[123]\b/i,/^Cả\s+[abc]\b/i,
    /^[123]\s*(,|và)\s*[123]/i,/^Câu\s+[123]/i,
    /^Đáp án\s+[123abc]/i,
    /^(Bao gồm\s+)?[Cc]ả\s+(ba|hai|[23])\b/i,
    /^Tất cả/i,
    /^Không có (đáp án|phương án)/i,
    /(phương án|đáp án|câu|ý)\s+trên/i,
    /^[abc]\s*,\s*[abc]/i,
    /^[ABC]\s*(,|và)\s*[ABC]\s*(,|và)?\s*[ABC]?\s*(đúng|sai|đều)/i,
    /^Lần lượt.*theo thứ tự/i
  ].some(p=>p.test(t));
}
function hasRefs(opts){return opts.some(o=>isRef(o))}
function shuffleOpts(q){
  if(hasRefs(q.o))return{...q};
  const idx=q.o.map((_,i)=>i),sh=shuffle(idx);
  return{...q,o:sh.map(i=>q.o[i]),a:sh.indexOf(q.a)};
}
function fmt(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function h(tag,props,...ch){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==='class')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='html')el.innerHTML=v;else el.setAttribute(k,v)});ch.flat().forEach(c=>{if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c)el.appendChild(c)});return el}
const app=document.getElementById('app');
let S={screen:'setup',cats:[],numQ:20,numQInput:'20',secPerQ:60,questions:[],answers:{},current:0,timeLeft:0,timer:null};

function showModal(msg,onOk){
  const o=h('div',{class:'modal-overlay'});
  o.appendChild(h('div',{class:'modal-box'},h('p',null,msg),
    h('div',{class:'modal-btns'},
      h('button',{class:'modal-cancel',onClick:()=>o.remove()},'Quay lại'),
      h('button',{class:'modal-confirm',onClick:()=>{o.remove();onOk()}},'Nộp bài'))));
  o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  document.body.appendChild(o);
}
function catCounts(){const m={};Q.forEach(q=>{m[q.c]=(m[q.c]||0)+1});return m}

function renderSetup(){
  const cc=catCounts();
  const avail=S.cats.length===0?Q.length:Q.filter(q=>S.cats.includes(q.c)).length;
  const en=S.numQ>0?Math.min(S.numQ,avail):0;
  app.innerHTML='';
  const w=h('div',{class:'container'},
    h('div',{style:'text-align:center;padding-top:24px'},
      h('div',{class:'badge'},'VATM Quiz System'),
      h('h1',null,'Trắc nghiệm VCS & VHF'),
      h('p',{class:'subtitle'},Q.length+' câu hỏi · '+CATS.length+' chủ đề')),
    (()=>{const c=h('div',{class:'card'});
      c.appendChild(h('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'},
        h('span',{class:'label',style:'margin:0'},'Chọn chủ đề'),
        h('button',{class:'link-btn',onClick:()=>{S.cats=S.cats.length===CATS.length?[]:[...CATS];renderSetup()}},
          S.cats.length===CATS.length?'Bỏ chọn tất cả':'Chọn tất cả')));
      CATS.forEach(cat=>{c.appendChild(h('button',{class:'cat-btn'+(S.cats.includes(cat)?' active':''),onClick:()=>{
        S.cats=S.cats.includes(cat)?S.cats.filter(x=>x!==cat):[...S.cats,cat];renderSetup()}},
        h('span',null,cat),h('span',{class:'cat-count'},cc[cat]+' câu')))});
      if(!S.cats.length)c.appendChild(h('p',{class:'note'},'Không chọn = thi tất cả'));
      return c})(),
    (()=>{const c=h('div',{class:'card'}),g=h('div',{class:'grid-2'});
      const c1=h('div',null,h('span',{class:'label'},'Số câu hỏi'));
      const p1=h('div',{class:'pill-group'});
      [10,20,30,50].forEach(n=>{p1.appendChild(h('button',{class:'pill'+(S.numQ===n?' active':''),onClick:()=>{S.numQ=n;S.numQInput=String(n);renderSetup()}},String(n)))});
      c1.appendChild(p1);
      const inp=h('input',{type:'number',value:S.numQInput,min:'1',placeholder:'Nhập số câu...'});
      inp.addEventListener('input',e=>{const r=e.target.value;S.numQInput=r;S.numQ=r===''?0:Math.max(0,parseInt(r,10)||0);
        const info=document.getElementById('info');if(info){const av=S.cats.length===0?Q.length:Q.filter(q=>S.cats.includes(q.c)).length;
        info.textContent='Sẽ thi '+Math.min(S.numQ||0,av)+' / '+av+' câu · Thời gian: '+fmt(Math.min(S.numQ||0,av)*S.secPerQ)}});
      c1.appendChild(inp);
      const c2=h('div',null,h('span',{class:'label'},'Giây / câu'));
      const p2=h('div',{class:'pill-group'});
      [30,45,60,90].forEach(s=>{p2.appendChild(h('button',{class:'pill'+(S.secPerQ===s?' active':''),onClick:()=>{S.secPerQ=s;renderSetup()}},s+'s'))});
      c2.appendChild(p2);g.append(c1,c2);c.appendChild(g);
      c.appendChild(h('p',{class:'note',style:'margin-top:12px',id:'info'},'Sẽ thi '+en+' / '+avail+' câu · Thời gian: '+fmt(en*S.secPerQ)));
      return c})(),
    h('button',{class:'btn-primary',onClick:startQuiz},'Bắt đầu thi'));
  app.appendChild(w);
}

function startQuiz(){
  if(S.numQ<=0)return;
  const pool=S.cats.length===0?Q:Q.filter(q=>S.cats.includes(q.c));
  const n=Math.min(S.numQ,pool.length);if(n<=0)return;
  S.questions=shuffle(pool).slice(0,n).map(shuffleOpts);
  S.answers={};S.current=0;S.timeLeft=n*S.secPerQ;S.screen='quiz';startTimer();renderQuiz();
}
function startTimer(){
  if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(()=>{S.timeLeft--;if(S.timeLeft<=0){clearInterval(S.timer);finish();return}
    const t=document.getElementById('tmr');if(t){t.textContent='⏱ '+fmt(S.timeLeft);t.className=S.timeLeft<60?'timer urgent':'timer'}},1000);
}
function finish(){if(S.timer)clearInterval(S.timer);S.screen='result';renderResult()}

function renderQuiz(){
  const qs=S.questions,ci=S.current,q=qs[ci],pct=((ci+1)/qs.length)*100;
  app.innerHTML='';
  app.appendChild(h('div',{class:'topbar'},h('div',{class:'topbar-inner'},
    h('div',{class:'topbar-row'},h('span',{style:'color:var(--muted)'},'Câu '+(ci+1)+' / '+qs.length),
      h('span',{id:'tmr',class:S.timeLeft<60?'timer urgent':'timer'},'⏱ '+fmt(S.timeLeft))),
    h('div',{class:'progress-bg'},h('div',{class:'progress-fill',style:'width:'+pct+'%'})))));
  const w=h('div',{class:'container',style:'padding-top:20px'});
  w.appendChild(h('div',{class:'card'},h('span',{class:'q-category'},q.c),h('p',{class:'q-text'},q.q)));
  q.o.forEach((opt,idx)=>{const L=String.fromCharCode(65+idx),sel=S.answers[ci]===idx;
    w.appendChild(h('button',{class:'opt-btn'+(sel?' selected':''),onClick:()=>{S.answers[ci]=idx;renderQuiz()}},
      h('span',{class:'opt-letter'},L),h('span',{style:'padding-top:2px'},opt)))});
  const nav=h('div',{class:'nav-row'});
  const pb=h('button',{class:'btn-nav btn-prev',onClick:()=>{if(ci>0){S.current--;renderQuiz()}}},
    '← Trước');if(ci===0)pb.disabled=true;nav.appendChild(pb);
  // Always show submit button
  nav.appendChild(h('button',{class:'btn-submit-always',onClick:()=>{
    const u=qs.length-Object.keys(S.answers).length;
    if(u>0){showModal('Bạn còn '+u+' câu chưa trả lời. Nộp bài?',finish);return}finish();
  }},'Nộp bài ✓'));
  if(ci<qs.length-1)nav.appendChild(h('button',{class:'btn-nav btn-next',onClick:()=>{S.current++;renderQuiz()}},'Tiếp →'));
  else nav.appendChild(h('span'));
  w.appendChild(nav);
  const dots=h('div',{class:'dot-grid'});
  qs.forEach((_,idx)=>{const ans=S.answers[idx]!==undefined,cur=idx===ci;
    dots.appendChild(h('button',{class:'dot '+(cur?'dot-current':ans?'dot-answered':'dot-default'),
      onClick:()=>{S.current=idx;renderQuiz()}},String(idx+1)))});
  w.appendChild(dots);app.appendChild(w);
}

function renderResult(){
  const qs=S.questions,ans=S.answers;
  const res=qs.map((q,i)=>({q,i,ua:ans[i],ok:ans[i]===q.a}));
  const score=res.filter(r=>r.ok).length,total=qs.length,pct=Math.round(score/total*100);
  const skip=res.filter(r=>r.ua===undefined).length;
  let grade,gc,gb;
  if(pct>=80){grade='Xuất sắc';gc='var(--green)';gb='rgba(16,185,129,.08)'}
  else if(pct>=60){grade='Khá';gc='var(--accent)';gb='rgba(14,165,233,.08)'}
  else if(pct>=40){grade='Trung bình';gc='var(--amber)';gb='rgba(245,158,11,.08)'}
  else{grade='Cần cố gắng';gc='var(--red)';gb='rgba(239,68,68,.08)'}
  let filter='all';app.innerHTML='';
  const w=h('div',{class:'container',style:'padding-top:24px'});
  w.appendChild(h('div',{class:'score-card',style:'background:'+gb},
    h('p',{style:'font-size:15px;color:var(--muted);margin-bottom:6px'},'Kết quả'),
    h('p',{class:'score-num',style:'color:'+gc},score+'/'+total),
    h('p',{class:'score-pct'},pct+'%'),
    h('p',{class:'score-label',style:'color:'+gc},grade),
    h('div',{class:'score-stats'},h('span',null,'✅ Đúng: '+score),h('span',null,'❌ Sai: '+(total-score-skip)),h('span',null,'⏭ Bỏ qua: '+skip))));
  const fr=h('div',{class:'filter-row'}),pills=h('div',{class:'pill-group'}),rv=h('div');
  function draw(){
    const list=filter==='all'?res:filter==='wrong'?res.filter(r=>!r.ok):res.filter(r=>r.ok);
    rv.innerHTML='';
    list.forEach(({q,i,ua,ok})=>{
      const c=h('div',{class:'review-card '+(ok?'review-correct':'review-wrong')});
      c.appendChild(h('div',{class:'review-head'},
        h('span',{class:'review-icon '+(ok?'review-icon-ok':'review-icon-no')},ok?'✓':'✗'),
        h('div',null,h('span',{class:'review-cat'},'Câu '+(i+1)+' · '+q.c),h('p',{class:'review-q'},q.q))));
      const od=h('div',{class:'review-opts'});
      q.o.forEach((opt,oi)=>{const ic=oi===q.a,iu=oi===ua;let cl='review-opt';
        if(ic)cl+=' opt-correct';if(iu&&!ic)cl+=' opt-wrong';
        od.appendChild(h('div',{class:cl},h('span',null,String.fromCharCode(65+oi)+'.'),
          h('span',null,opt+(ic?' ✅':'')+(iu&&!ic?' ❌':''))))});
      c.appendChild(od);
      if(q.e)c.appendChild(h('div',{class:'explain-box'},h('p',null,h('span',null,'Giải thích: '),q.e)));
      if(ua===undefined)c.appendChild(h('p',{style:'margin-left:36px;margin-top:6px;font-size:14px;color:var(--amber);font-style:italic'},'Bạn chưa trả lời câu này'));
      rv.appendChild(c)});
  }
  [['all','Tất cả'],['wrong','Sai'],['correct','Đúng']].forEach(([k,l])=>{
    pills.appendChild(h('button',{class:'pill'+(filter===k?' active':''),onClick:()=>{
      filter=k;pills.querySelectorAll('.pill').forEach((p,pi)=>{p.className='pill'+(['all','wrong','correct'][pi]===k?' active':'')});draw()}},l))});
  fr.appendChild(pills);
  fr.appendChild(h('button',{class:'pill',style:'background:var(--surface)',onClick:()=>{S.screen='setup';renderSetup()}},'↻ Thi lại'));
  w.appendChild(fr);w.appendChild(rv);
  w.appendChild(h('button',{class:'btn-primary',style:'margin-top:18px',onClick:()=>{S.screen='setup';renderSetup()}},'Thi lại'));
  app.appendChild(w);draw();
}
renderSetup();
</script>
</body>
</html>
