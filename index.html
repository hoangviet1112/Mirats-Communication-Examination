<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VATM Quiz — Trắc nghiệm VCS & VHF</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--surface:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--accent:#0ea5e9;--accent2:#38bdf8;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;font-size:16px}
.container{max-width:680px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);border-radius:999px;padding:5px 16px;font-size:14px;color:var(--accent);font-weight:500;letter-spacing:.5px;margin-bottom:12px}
h1{font-size:2rem;font-weight:700;letter-spacing:-.02em;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--muted);font-size:15px;margin-bottom:24px}
.label{font-size:15px;font-weight:600;color:#94a3b8;margin-bottom:8px;display:block}
.cat-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;border:1px solid transparent;background:rgba(30,41,59,.6);color:var(--muted);font-size:15px;cursor:pointer;transition:all .15s;text-align:left;margin-bottom:5px}
.cat-btn:hover{background:rgba(30,41,59,1)}.cat-btn.active{background:rgba(14,165,233,.1);border-color:rgba(14,165,233,.3);color:var(--accent2)}
.cat-count{font-size:13px;opacity:.6}
.pill-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{padding:7px 16px;border-radius:10px;font-size:15px;font-weight:500;background:#1e293b;color:var(--muted);border:none;cursor:pointer;transition:all .15s}
.pill.active{background:var(--accent);color:#fff}.pill:hover:not(.active){background:#334155}
input[type=number]{width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 14px;color:#fff;font-size:15px;margin-top:6px}
input[type=number]:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:15px;background:var(--accent);color:#fff;font-size:18px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--accent2)}.btn-primary:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,15,30,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 16px}
.topbar-inner{max-width:680px;margin:0 auto}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:15px}
.timer{font-family:'SF Mono',Monaco,monospace;font-weight:700;color:var(--accent);font-size:16px}
.timer.urgent{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bg{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.q-category{font-size:13px;color:rgba(14,165,233,.6);font-weight:500}
.q-text{font-size:18px;font-weight:500;margin-top:8px;line-height:1.65}
.opt-btn{width:100%;text-align:left;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:#cbd5e1;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:all .15s;margin-bottom:7px;font-size:16px}
.opt-btn:hover{border-color:#475569;background:rgba(30,41,59,.8)}
.opt-btn.selected{background:rgba(14,165,233,.1);border-color:rgba(14,165,233,.35);color:var(--accent2)}
.opt-letter{flex-shrink:0;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:#1e293b;color:#64748b}
.opt-btn.selected .opt-letter{background:var(--accent);color:#fff}
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px}
.btn-nav{padding:11px 22px;border-radius:12px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn-prev{background:#1e293b;color:#cbd5e1}.btn-prev:hover{background:#334155}.btn-prev:disabled{opacity:.3;cursor:not-allowed}
.btn-next{background:var(--accent);color:#fff}.btn-next:hover{background:var(--accent2)}
.btn-submit{background:var(--green);color:#fff}.btn-submit:hover{background:#34d399}
.btn-submit-always{background:var(--green);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-submit-always:hover{background:#34d399}
.dot-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:20px}
.dot{width:34px;height:34px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.dot-default{background:#1e293b;color:#64748b}.dot-default:hover{background:#334155}
.dot-answered{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.dot-current{background:var(--accent);color:#fff;box-shadow:0 0 0 3px rgba(14,165,233,.3)}
.score-card{text-align:center;padding:30px 22px;border-radius:16px;border:1px solid var(--border);margin-bottom:20px}
.score-num{font-size:3.2rem;font-weight:700;margin-bottom:2px}.score-pct{font-size:1.5rem;font-weight:600;color:#cbd5e1}
.score-label{font-size:16px;font-weight:500;margin-top:6px}
.score-stats{display:flex;justify-content:center;gap:18px;margin-top:14px;font-size:14px;color:var(--muted)}
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.review-card{border-radius:16px;padding:18px;margin-bottom:10px}
.review-correct{border:1px solid rgba(16,185,129,.2);background:rgba(16,185,129,.03)}
.review-wrong{border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.03)}
.review-icon{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.review-icon-ok{background:rgba(16,185,129,.15);color:var(--green)}.review-icon-no{background:rgba(239,68,68,.15);color:var(--red)}
.review-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.review-cat{font-size:13px;color:#64748b}.review-q{font-size:15px;font-weight:500;margin-top:3px;line-height:1.55}
.review-opts{margin-left:36px}
.review-opt{display:flex;align-items:flex-start;gap:7px;font-size:14px;color:#64748b;margin-bottom:3px}
.review-opt.opt-correct{color:var(--green);font-weight:500}.review-opt.opt-wrong{color:var(--red);text-decoration:line-through}
.explain-box{margin-left:36px;margin-top:10px;background:rgba(30,41,59,.5);border-radius:10px;padding:12px 14px}
.explain-box p{font-size:14px;color:rgba(56,189,248,.75);line-height:1.55}.explain-box span{font-weight:600}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.link-btn{font-size:14px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500}.link-btn:hover{color:var(--accent2)}
.note{font-size:13px;color:#475569;margin-top:8px;text-align:center}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 24px;max-width:380px;width:100%;text-align:center}
.modal-box p{font-size:16px;margin-bottom:20px;line-height:1.6;color:var(--text)}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{flex:1;padding:12px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.modal-cancel{background:#1e293b;color:#94a3b8}.modal-cancel:hover{background:#334155}
.modal-confirm{background:var(--green);color:#fff}.modal-confirm:hover{background:#34d399}
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q=[{c:"VCS - Lý thuyết chung",q:`Tín hiệu liên tục theo thời gian (Continuous - Time Signal) là tín hiệu:`,o:["Có biên độ liên tục.", "Có biến độc lập (thời gian) liên tục.", "Có biên độ rời rạc"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu được lấy mẫu (Sampled signal) là tín hiệu.`,o:["Rời rạc (Discrete Signal)", "Có thể biểu diễn bằng một dãy số", "Cả 1 và 2"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu tương tự (Analog signal) là tín hiệu.`,o:["Liên tục về mặt thời gian", "Liên tục về mặt thời gian và biên độ", "Liên tục về mặt biên độ"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Quá trình lấy mẫu tín hiệu là quá trình.`,o:["Chuyển đổi các tín hiệu liên tục thành tín hiệu rời rạc", "Biến đổi độ lớn biên độ các xung thành một chuỗi số đo nhị phân tương ứng.", "Khuyếch đại tín hiệu"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu được lượng tử hoá là.`,o:["Tín hiệu tương tự có biên độ rời rạc hoá.", "Tín hiệu có biên độ liên tục.", "Tín hiệu số."],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Lượng tử tuyến tính là.`,o:["Phép chia dải biên độ thành các mức lượng tử bằng nhau.", "Phép khắc phục méo lượng tử.", "Phép nén tín hiệu theo một quy luật đường cong không đều"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Lượng tử phi tuyến là.`,o:["Phép chia dải biên độ thành các mức lượng tử bằng nhau.", "Phép khắc phục méo lượng tử.", "Phép nén tín hiệu theo một quy luật đường cong không đều"],a:2,e:``},{c:"VCS - Lý thuyết chung",q:`Mã hoá là quá trình.`,o:["Rời rạc hoá tín hiệu.", "Biến đổi độ lớn biên độ các xung thành một chuỗi số đo nhị phân tương ứng.", "Biến đổi các từ mã thành các xung rời rạc có giá trị biên độ tương ứng"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu số (digital signal) là tín hiệu.`,o:["Rời rạc (theo biến độc lập thời gian) và có biên độ được rời rạc hoá (lượng tử hoá)", "Rời rạc về mặt biên độ và liên tục về mặt thời gian.", "Liên tục về mặt thời gian và biên độ"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Trong quá trình thực hiện điều chế PCM, trình tự các bước được tiến hành như­ sau.`,o:["Lấy mẫu, lượng tử, mã hoá, lọc", "Lọc, lấy mẫu, lượng tử, mã hoá", "Mã hoá, lọc, lấy mẫu, lượng tử", "Lượng tử, lấy mẫu, mã hoá, lọc"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu thoại có phổ tần số 300 đến 3400 Hz, như vậy tần số lấy mẫu theo chuẩn PCM là`,o:["400 hz", "3400 Hz", "600 Hz", "8000 hz"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Trong cấu trúc PCM 30 người ta dùng khe thời gian nào để báo hiệu`,o:["Khe TS0", "Khe TS16", "Khe TS30", "Khe TS32"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Trong cấu trúc PCM 30 người ta dùng khe thời gian nào để đồng bộ khung`,o:["Khe TS0", "Khe TS16", "Khe TS30", "Khe TS32"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu tương tự (analogue) là tín hiệu:`,o:["Không liên tục", "Rời rạc về thời gian", "Liên tục về thời gian và có khả năng nhận bất cứ giá trị nào trong khoảng từ giá trị lớn nhất đến giá trị nhỏ nhất", "Có giá trị có thể nhận một số giới hạn các trị số"],a:2,e:``},{c:"VCS - Lý thuyết chung",q:`Tín hiệu số (digital) là tín hiệu`,o:["Không liên tục", "Rời rạc về thời gian", "Các giá trị có thể nhận là giới hạn", "Cả 1,2,3"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Quá trình biến đổi tín hiệu từ tương tự sang số theo thứ tự sau:`,o:["Lọc thông thấp, mã hóa, lấy mẫu, lượng tử", "Lọc thông thấp, lấy mẫu, lượng tử, mã hóa", "Lấy mẫu, lọc thông thấp, lượng tử, mã hóa", "Lọc thông thấp, lượng tử, lấy mẫu, mã hóa"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Việc xử lý tín số ngày càng được sử dụng rộng rãi do các ưu điểm:`,o:["Không bị méo dạng tín hiệu do nhiệt độ, dung sai hay già cỗi của các thành phần", "Dễ dàng thiết lập các thông số của bộ khuếch đại, lọc", "Truyền tín hiệu đi xa ít bị lỗi hơn so với tín hiệu tương tự", "Cả 1,2,3"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Băng thông thoại thường được sử dụng trong hệ thống thông tin thoại là:`,o:["300-3400Hz", "300-1000Hz", "0-10KHz", "0-20KHz"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Trong hệ thống PCM30 (32), khe thời gian số 0 (timeslot 0) dùng để truyền tín hiệu nào:`,o:["Tín hiệu thoại", "Tín hiệu PTT", "Tín hiệu đồng bộ", "Không truyền tín hiệu gì"],a:2,e:``},{c:"VCS - Lý thuyết chung",q:`Trong quá trình biến đổi tín hiệu từ tương tự sang số, luật nén giãn tín hiệu tiêu chuẩn châu Âu A-Law có thể được áp dụng trong bước:`,o:["Lọc thông thấp", "Mã hóa", "Lượng tử hóa", "Lấy mẫu"],a:2,e:``},{c:"VCS - Lý thuyết chung",q:`Trong xử lý tín hiệu, phát biểu nào sau đây không chính xác:`,o:["Lấy mẫu là quá trình đọc các giá trị của tín hiệu tương tự theo một chu kỳ xác định.", "Lấy mẫu là quá trình đọc các giá trị của tín hiệu số theo một chu kỳ xác định.", "Định lý lấy mẫu Nyquist-Shannon qui định tần số lấy mẫu lớn hơn gấp đôi tần số tối đa (fs>2fmax)."],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Chuyển mạch kênh được hiểu là:`,o:["Chuyển mạch không gian tương tự", "Chuyển mạch PAM", "Chuyển mạch số", "Bao gồm cả 1, 2 và 3"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Trong chuyển mạch số tín hiệu đầu vào bộ chuyển mạch phải là tín hiệu:`,o:["Tín hiệu tương tự", "Tín hiệu số", "Tín hiệu rời rạc dạng PAM", "Tín hiệu số dạng PCM"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Đơn vị xử lý thông tin dùng trong chuyển mạch số là:`,o:["Bit", "Time Slot", "Packet", "Cell"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Trong điều chế xung mã PCM là chữ viết tắt của cụm từ`,o:["Power Control Module", "Pulse Code Modulation", "Powertrain Control Module"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Có những phương thức truyền tín hiệu nào trong hệ thống truyền thông hiện nay`,o:["Đơn công và song công", "Song công và bán song công", "Đơn công và bán song công", "Đơn công, song công và bán song công"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Trong các chữ viết tắt dưới đây, chữ nào là ghép kênh phân chia theo thời gian.`,o:["FDMA", "TDM", "FDM", "TDMA"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Chế độ truyền dẫn, khi dữ liệu chỉ truyền một chiều từ bên gửi đến bên nhận gọi là`,o:["Simplex", "Full-duplex", "Half-duplex", "Cả 3 Mode trên đều được."],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Nếu biên độ của tín hiệu rời rạc được lượng tử hóa thì tín hiệu đó được gọi là ….`,o:["Tín hiệu số", "Tín hiệu tương tự", "Tín hiệu lấy mẫu", "Tín hiệu lượng tử hóa"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Một tín hiệu tương tự xa(t) có tần số cao nhất là Fmax thì sau khi lấy mẫu, xa(t) có thể được phục hồi một cách chính xác từ giá trị các mẫu của nó nếu tần số lấy mẫu thỏa mãn:`,o:["Fs ≥ 2Fmax", "Fs = 2Fmax", "Fs ≤ 2Fmax", "Fs> Fmax"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Hãy chọn cách phát biểu đúng và đầy đủ nhất cho phát biểu “Về mặt biểu diễn toán học, tín hiệu số là tín hiệu…”`,o:["Rời rạc theo biến số và rời rạc theo hàm số", "Rời rạc theo biến số và liên tục theo hàm số", "Liên tục theo biến số và rời rạc theo hàm số", "Liên tục theo biến số và liên tục theo hàm số"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Hãy chọn cách phát biểu đúng và đầy đủ nhất cho phát biểu “Về mặt biểu diễn toán học, tín hiệu rời rạc là tín hiệu…”`,o:["Rời rạc theo biến số và rời rạc theo hàm số", "Rời rạc theo biến số và có thể liên tục hoặc rời rạc theo hàm số", "Liên tục theo biến số và rời rạc theo hàm số", "Liên tục theo biến số và liên tục theo hàm số"],a:1,e:``},{c:"VCS - Lý thuyết chung",q:`Trong ghép kênh TDM là chữ viết tắt của cụm từ`,o:["Time Division Multiplexer/Multiplexing", "Time Domain Multiplexing", "Technical Data Manager"],a:0,e:``},{c:"VCS - Lý thuyết chung",q:`Nếu phổ tín hiệu có băng thông là 500Hz, tần số cao nhất là 600Hz thì tốc độ lấy mẫu là…`,o:["200 mẫu/giây", "500 mẫu/giây", "1.000 mẫu/giây", "1.200 mẫu/giây"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Định lý Nyquist cho biết tốc độ lấy mẫu tối thiểu của tín hiệu là….`,o:["bằng tần số thấp nhất của tín hiệu", "bằng tần số cao nhất của tín hiệu", "gấp đôi băng thông của tín hiệu", "gấp đôi tần số cao nhất của tín hiệu"],a:3,e:``},{c:"VCS - Lý thuyết chung",q:`Yếu tố tạo độ chính xác khi tái tạo tín hiệu tương tự từ luồng PCM l s 3020X",q:`Cổng nào trên hệ thống IP Backup kết nối trực tiếp tới card ERIF của VCCS:`,o:["S0", "E0", "A0", "A1"],a:2,e:``},{c:"VCS - Frequentis 3020X",q:`Rack BGT iMCc6 của hệ thống IP backup sử dụng nguồn`,o:["48 VDC", "220 VAC", "24 VDC"],a:2,e:``},{c:"VCS - Frequentis 3020X",q:`Trên hệ thống IP Backup, thông số Signalling Mode đang cài đặt trên cổng A0 là`,o:["Contact", "VOX", "Mute", "Remote"],a:0,e:``},{c:"VCS - Frequentis 3020X",q:`Tần số nào sau đây không đấu nối qua hệ thống IP Backup`,o:["132.3 MHz Mộc Châu", "121.5 MHz Vinh", "125.9 MHz Vinh", "132.3 Mhz Local"],a:3,e:``},{c:"VCS - Frequentis 3020X",q:`Để tạo một vị trí điều hành (OP) mới trên phần mềm TMCS, bước đầu tiên ta phải khai báo trong`,o:["Telephone Tree", "Hardware Tree", "Radio Tree"],a:1,e:``},{c:"VCS - Frequentis 3020X",q:`Khi khai báo một kênh VHF offset 2 điểm, mỗi điểm có một cặp máy Main/Standby; ta phải tạo ra mấy Location`,o:["1", "2", "4", "8"],a:2,e:``},{c:"VCS - Frequentis 3020X",q:`Khi khai báo một nhãn VHF, muốn phần TX và RX chuyển Main/Standby đồng thời với nhau theo cặp, ta tích chọn vào thông số nào trong mục Detailed Settings`,o:["Automatic main/stdby switch-over for RX and TX", "Automatic Frequency Test", "One Tx location is main systemwide", "BSS mode: Enabled"],a:0,e:``},{c:"VCS - Frequentis 3020X",q:`Cấu hình khai báo trong Hardware Tree -> Trunkline của một kênh thoại hotline sử dụng card BCA:`,o:["Mode: eInOut\nType: eUnselective\n Signalling: eE_M", "Mode: eInOut\nType: eUnselective\nSignalling: E_Loop_RingAuto", "Mode: eInOut\nType: ePABX\nSignalling: e_Loop_RingDial DTMF"],a:1,e:``},{c:"VCS - Frequentis 3020X",q:`Để xem số Number của một Logical Position, ta vào mục nào trong giao diện Telephone Tree`,o:["Telephone Book", "Telephone Number Conversion", "Trunk Group", "Internal Interphones"],a:0,e:``},{c:"VCS - Frequentis 3020X",q:`Card 4W E&M sử dụng chế độ báo hiệu type 2. Ở chế độ có báo hiệu phát biểu nào sau đây là đúng khi đo chân E và SG`,o:["Đo điện trở, điện trở giữa M và SB là vô cùng.", "Đo điện áp, điện áp giữa M và SB là 12V", "Đo điện trở, điện trở giữa M và SB là 0 Ω", "Đo điện áp, điện áp giữa M và SB là 0V"],a:3,e:``},{c:"VCS - Frequentis 3020X",q:`Khi lỗi các thiết bị phụ trợ kết nối vào bàn TED như iPIP, ILSP, trên phần mềm giám sát sẽ cảnh báo đỏ ở đối tượng nào`,o:["TED", "Connection", "AUX", "BOOT"],a:2,e:``},{c:"VCS - Frequentis 3020X",q:`Để khai báo một kênh thoại SpeedDial ta vào mục nào trong Telephone Tree:`,o:["Telephone Book -> Add External Party", "Call Forwarding -> Add External Party", "Internal Interphones -> Add"],a:0,e:``},{c:"VCS - Frequentis 3020X",q:`Khi gặp cảnh báo lỗi nào sau đây trên card CIF, nhân viên kỹ thuật phải thực hiện thay thế card:`,o:["Connection", "OS", "FAN"],a:1,e:``},{c:"VHF - Lý thuyết chung",q:`Để có thể khuếch đại các tín hiệu có tần số thấp và tăng khả năng chống nhiễu người ta thường sử dụng mạch:`,o:["A. Khuếch đại vi sai", "B. Darlington", "C. Cascode", "D. Hồi tiếp dương"],a:2,e:`Mạch Cascode ghép 2 transistor nối tiếp giúp tăng trở kháng ra, giảm hiệu ứng Miller, phù hợp khuếch đại tần số cao và tăng khả năng chống nhiễu.`},{c:"VHF - Lý thuyết chung",q:`Để khử hiện tượng tự kích người ta thường dùng:`,o:["A. Mạch AGC", "B. Mạch AFC", "C. Phương pháp hồi tiếp dương", "D. Hồi tiếp âm"],a:3,e:`Hồi tiếp âm (negative feedback) làm giảm độ lợi nhưng ổn định mạch, triệt tiêu xu hướng tự kích.`},{c:"VHF - Lý thuyết chung",q:`Nguyên lý đổi tần dựa vào:`,o:["A. Đặc tính tuyến tính của Transistor và Diode", "B. Đặc tính phi tuyến của Transistor và Diode", "C. Độ khuếch đại của Transistor", "D. Cả 3 đáp án trên đều sai"],a:1,e:`Đổi tần dựa vào đặc tính phi tuyến của linh kiện (Transistor/Diode), tạo ra các thành phần tần số tổng/hiệu khi nhân hai tín hiệu.`},{c:"VHF - Lý thuyết chung",q:`Nhiệm vụ của mạch đổi tần trong máy thu thanh AM`,o:["A. Đổi tần số tín hiệu cao tần cần thu", "B. Trộn tín hiệu cao tần cần thu với dao động ngoại sai", "C. Khuếch đại tín hiệu cao tần và dao động ngoại sai", "D. Đổi tín hiệu cao tần AM thành tín hiệu trung tần AM có tần số sóng mang 455 KHz"],a:3,e:`Mạch đổi tần trộn tín hiệu cao tần cần thu với dao động nội để tạo tín hiệu trung tần cố định 455 kHz có đặc tính AM.`},{c:"VHF - Lý thuyết chung",q:`Các công đoạn của quá trình số hoá tín hiệu audio:`,o:["A. Lấy mẫu, lượng tử hoá và mã hoá.", "B. Lượng tử hoá, mã hoá và giải mã.", "C. Lọc thông cao, lượng tử hoá và mã hóa.", "D. Lọc thông thấp, mã hoá và giải mã."],a:0,e:`Số hoá tín hiệu audio gồm 3 bước: Lấy mẫu (Sampling) → Lượng tử hoá (Quantization) → Mã hoá (Encoding).`},{c:"VHF - Lý thuyết chung",q:`Mã hóa kênh (channel coding) là quá trình được thực hiện:`,o:["A. Đối với tín hiệu audio tương tự", "B. Khi tái tạo tín hiệu audio tương tự từ tín hiệu audio số", "C. Trước khi lưu trữ và truyền dẫn tín hiệu audio số", "D. Trong bộ biến đổi tương tự sang số (A/D)"],a:2,e:`Mã hoá kênh được thực hiện trước khi lưu trữ/truyền dẫn tín hiệu audio số, nhằm thêm bit kiểm lỗi.`},{c:"VHF - Lý thuyết chung",q:`Các phương tiện và kỹ thuật dùng để lưu trữ tín hiệu audio số:`,o:["A. Compact Disc", "B. MiniDisc", "C. Digital Audio Tape (DAT)", "D. Cả 1, 2 và 3 đều đúng"],a:3,e:`Cả CD, MiniDisc và DAT đều là phương tiện lưu trữ tín hiệu audio số.`},{c:"VHF - Lý thuyết chung",q:`Mã hoá kênh trong audio số nhằm mục đích:`,o:["A. Thích ứng với kênh truyền", "B. Giảm sự mất mát thông tin trong thời gian truyền dẫn hay ghi âm", "C. Làm cho dạng phổ tín hiệu âm thanh số ít bị méo nhất", "D. Cả 1, 2 và 3 đều đúng"],a:3,e:`Mã hoá kênh vừa thích ứng với kênh truyền, vừa giảm mất thông tin, vừa làm phổ ít bị méo — cả 3 đều đúng.`},{c:"VHF - Lý thuyết chung",q:`Transistor của mạch khuếch đại công suất th­ường làm việc ở:`,o:["A. Chế độ C", "B. Chế độ A", "C. Chế độ B hoặc AB", "D. Chế độ D"],a:2,e:`Khuếch đại công suất dùng chế độ B (hoặc AB) để đạt hiệu suất cao; chế độ A hiệu suất thấp nhưng méo ít hơn.`},{c:"VHF - Lý thuyết chung",q:`Ưu điểm của cách ghép tầng khuếch đại âm tần trực tiếp là:`,o:["A. Ngăn cách thành phần một chiều giữa các tầng", "B. Dễ dàng trong việc tính toán và thiết kế", "C. Dễ tích hợp trong IC và tăng độ trung thực", "D. Tăng hiệu suất"],a:2,e:`Ghép trực tiếp (DC coupling) giúp tích hợp tốt vào IC và duy trì độ trung thực (fidelity) cao của tín hiệu.`},{c:"VHF - Lý thuyết chung",q:`Mạch AGC đưa đến điều khiển những khối nào trong máy thu hình?`,o:["A. Khối kênh và khuếch đại trung tần", "B. Khối kênh và khuếch đại thị tần", "C. Khuếch đại trung tần và khuếch đại thị tần", "D. Khuếch đại trung tần và tách sóng thị tần"],a:0,e:`Mạch AGC điều khiển độ khuếch đại của Khối kênh (tuner) và Khuếch đại trung tần (IF amp) để giữ mức tín hiệu ổn định.`},{c:"VHF - Lý thuyết chung",q:`Thành phần linh kiện phần cứng nào trong cấu trúc máy thu vô tuyến đóng vai trò quyết định nhất đến Hệ số tạp âm (Noise Figure) và độ nhạy tổng thể của hệ thống?`,o:["A. Bộ khuếch đại công suất cao tần (HPA).", "B. Mạch lọc dải thông trung tần (IF Filter).", "C. Bộ khuếch đại tạp âm thấp đầu vào (LNA - Low Noise Amplifier).", "D. D. Mạch giải điều chế tách sóng biên độ (AM Detector)."],a:2,e:`LNA (Low Noise Amplifier) đặt ngay sau anten quyết định Noise Figure tổng thể và độ nhạy hệ thống theo công thức Friis.`},{c:"VHF - Lý thuyết chung",q:`Mục đích của mã hóa nguồn tín hiệu trong truyền thông là gì`,o:["A. Để chất lượng tín hiệu tốt hơn", "B. Để truyền thông tin đi nhanh hơn", "C. Để dễ dàng khôi phục thông tin bị mất ở phía thu", "D. Để tăng hiệu quả sử dụng kênh"],a:3,e:`Mã hoá nguồn loại bỏ thông tin dư thừa (nén) nhằm tăng hiệu quả sử dụng băng thông kênh truyền.`},{c:"VHF - Lý thuyết chung",q:`Nhiệm vụ chủ yếu của ăng ten phát vô tuyến điện là:`,o:["A. Biến đổi năng lượng tín hiệu điện thành sóng điện từ bức xạ vào không gian", "B. Biến đổi năng lượng tín hiệu điện", "C. Khuyếch đại tín hiệu cao tần"],a:0,e:`Nhiệm vụ chủ yếu của anten phát là biến đổi năng lượng điện thành sóng điện từ bức xạ ra không gian.`},{c:"VHF - Lý thuyết chung",q:`Với một bộ khuếch đại có độ lợi 10dB thì tỉ số điện áp đầu ra/vào là bao nhiêu:`,o:["A. 10", "B. 20", "C. 2.3", "D. 3.162"],a:3,e:`Độ lợi 10 dB: 10dB = 20×log(Vout/Vin) → Vout/Vin = 10^(10/20) = 10^0.5 ≈ 3.162.`},{c:"VHF - Lý thuyết chung",q:`Chế độ truyền mà dữ liệu có thể truyền cả hai chiều cùng lúc là:`,o:["A. Simplex", "B. Half duplex", "C. Full duplex", "D. Cả 1, 2, 3 đều đúng"],a:2,e:`Full duplex: dữ liệu truyền đồng thời hai chiều (ví dụ điện thoại).`},{c:"VHF - Lý thuyết chung",q:`Trong máy thu vô tuyến điện, khuếch đại trực tiếp tín hiệu thu được sau anten được đưa`,o:["A. Qua bộ khuếch đại cao tần,. trước khi vào bộ tách sóng", "B. Qua bộ tách sóng, sau đó đến bộ khuếch đại cao tần", "C. Qua bộ khuếch đại cao tần, không qua bộ tách sóng nào"],a:0,e:`Máy thu khuếch đại trực tiếp: tín hiệu từ anten qua bộ khuếch đại cao tần trước khi vào bộ tách sóng.`},{c:"VHF - Lý thuyết chung",q:`Độ rộng băng thông (bandwidth) của tín hiệu đầu ra bộ trộn tần`,o:["A. Bằng độ rộng băng thông tín hiệu đầu vào", "B. Lớn hơn độ rộng băng thông tín hiệu đầu vào", "C. Nhỏ hơn độ rộng băng thông tín hiệu đầu vào"],a:0,e:`Bộ trộn tần là thiết bị tuyến tính theo từng đầu vào; băng thông đầu ra bằng băng thông tín hiệu đầu vào (IF filter chọn lọc sau đó).`},{c:"VHF - Lý thuyết chung",q:`Truyền bất đồng bộ là:`,o:["A. Xung clock lấy mẫu dữ liệu bất đồng bộ với dữ liệu", "B. Dữ liệu được đóng gói bằng bit Start và bit Stop", "C. Cả 1 và 2 đều đúng", "D. Cả 1 và 2 đếu sai"],a:2,e:`Truyền bất đồng bộ dùng bit Start/Stop để đóng gói dữ liệu và clock lấy mẫu không đồng bộ — cả hai điều đúng.`},{c:"VHF - Lý thuyết chung",q:`Nguồn thu nhận được ¼ năng lượng so với bên nguồn phát thì độ suy giảm tín hiệu là?`,o:["A. 13.8dB", "B. 1.38dB", "C. 6dB", "D. 12dB"],a:2,e:`1/4 công suất = -6 dB: 10×log(1/4) = 10×(-0.602) ≈ -6 dB → suy giảm 6 dB.`},{c:"VHF - Lý thuyết chung",q:`Phương pháp điều chế nào sau đây bị ảnh hưởng nhiễu nhiều nhất`,o:["A. ASK", "B. PSK", "C. FSK", "D. QAM"],a:0,e:`ASK (Amplitude Shift Keying) nhạy cảm nhất với nhiễu biên độ vì thông tin mang trong biên độ sóng mang.`},{c:"VHF - Lý thuyết chung",q:`Chức năng của bộ lọc thông cao là:`,o:["A. Tín hiệu tần số cao bị suy giảm biên độ.", "B. Tín hiệu tần số cao không bị suy giảm biên độ.", "C. Tín hiệu tần số thấp không bị suy giảm biên độ.", "D. Tất cả các tần số của tín hiệu đều bị suy giảm biên độ"],a:1,e:`Bộ lọc thông cao cho tín hiệu tần số cao đi qua không bị suy giảm; chặn tần số thấp.`},{c:"VHF - Lý thuyết chung",q:`Phát biểu nào sai về mạch khuếch đại vi sai`,o:["A. Không có các tụ điện", "B. Những điện áp trôi DC sẽ bị triệt", "C. Sử dụng 2 transistor", "D. Cấu tạo mạch đơn giản"],a:3,e:`Khuếch đại vi sai có cấu tạo đối xứng, phức tạp (2 transistor, nhiều điện trở); không đơn giản — phát biểu D sai.`},{c:"VHF - Lý thuyết chung",q:`Đáp ứng tần số của một mạch khuếch đại là`,o:["A. Mô tả độ lợi thay đổi khi tần số tín hiệu vào thay đổi", "B. Mô tả độ lợi thay đổi khi tần số tín hiệu ra thay đổi", "C. Mô tả công suất thay đổi khi tần số tín hiệu vào thay đổi", "D. Mô tả công suất thay đổi khi tần số tín hiệu ra thay đổi"],a:0,e:`Đáp ứng tần số mô tả sự thay đổi của độ lợi (gain) khi tần số tín hiệu đầu vào thay đổi.`},{c:"VHF - Lý thuyết chung",q:`Hệ số khuếch đại tổng thể của bộ khuếch đại nhiều tầng được xác định như thế nào ?`,o:["A. Tích các hệ số khuếch đại mỗi tầng", "B. Tổng các hệ số khuếch đại mỗi tầng", "C. Tổng các hệ số khuếch đại mỗi tầng chia cho số tầng khuếch đại.", "D. Bằng ba lần hệ số khuếch đại tầng đầu tiên"],a:0,e:`Hệ số khuếch đại tổng thể nhiều tầng = tích các hệ số từng tầng (hoặc cộng khi tính bằng dB).`},{c:"VHF - Lý thuyết chung",q:`Mạch khuếch đại có các độ lợi sau:`,o:["A. Điện áp", "B. Dòng điện", "C. Công suất", "D. Cả 3 câu đúng"],a:3,e:`Mạch khuếch đại có cả ba loại độ lợi: điện áp, dòng điện và công suất.`},{c:"VHF - Lý thuyết chung",q:`Mạch khuếch đại sử dụng trong:`,o:["A. Hệ thống âm thanh (Audio)", "B. Các bộ thu radio và TV", "C. Thiết bị đo lường", "D. Cả 3 câu đúng"],a:3,e:`Mạch khuếch đại được dùng trong âm thanh, radio/TV và thiết bị đo lường — cả ba đúng.`},{c:"VHF - Lý thuyết chung",q:`Độ lợi áp Av:`,o:["A. Vout/Vin", "B. Iout / Iin", "C. Pout / Pin", "D. Cả 3 câu đúng"],a:0,e:`Độ lợi áp Av = Vout/Vin (tỉ số điện áp đầu ra trên đầu vào).`},{c:"VHF - Lý thuyết chung",q:`Độ lợi công suất Ap tính theo Decibel (dB) là:`,o:["A. 20lg(Vout/ Vin)", "B. 20lg(Iout / Iin)", "C. 10lg(Pout / Pin)", "D. 10lg(Vout/ Vin)"],a:2,e:`Độ lợi công suất (dB) = 10×log(Pout/Pin).`},{c:"VHF - Lý thuyết chung",q:`Tổng trở vào Zin là:`,o:["A. Vin / Iin", "B. Vout / Iin", "C. Vin / Iout", "D. Vout/ Vin"],a:0,e:`Tổng trở vào Zin = Vin/Iin (điện áp vào chia dòng vào).`},{c:"VHF - Lý thuyết chung",q:`Op-amp có nghĩa là:`,o:["A. Khuếch đại thuật toán", "B. Khuếch đại tuyến tính", "C. Khuếch đại vi sai", "D. Khuếch đại phi tuyến"],a:0,e:`Op-amp = Operational Amplifier = Khuếch đại thuật toán.`},{c:"VHF - Lý thuyết chung",q:`Hồi tiếp dương có khuynh hướng:`,o:["A. Tăng độ méo trong mạch khuếch đại", "B. Giảm băng thông hiệu dụng", "C. Làm mạch dễ bị dao động", "D. Cả 3 câu đúng"],a:3,e:`Hồi tiếp dương tăng độ méo, giảm băng thông và dễ gây dao động — cả ba đều đúng.`},{c:"VHF - Lý thuyết chung",q:`Hồi tiếp âm có khuynh hướng:`,o:["A. Độ lợi khuếch đại bị giảm", "B. Độ méo giảm", "C. Băng thông tăng", "D. Cả 3 câu đúng"],a:3,e:`Hồi tiếp âm giảm độ lợi nhưng giảm méo và tăng băng thông — cả ba đều đúng.`},{c:"VHF - Lý thuyết chung",q:`Trong trường hợp mạch có hồi tiếp dương, hãy cho biết kết luận nào sau đây là sai:`,o:["A. Làm mạch ổn định", "B. Làm giảm băng thông", "C. Làm tăng tín hiệu ngõ ra.", "D. Làm tăng độ méo."],a:0,e:`Hồi tiếp dương KHÔNG làm mạch ổn định; ngược lại nó gây mất ổn định — kết luận A là sai.`},{c:"VHF - Lý thuyết chung",q:`Mệnh đề nào sau đây là đúng?`,o:["A. Sóng điện từ là quá trình biến đổi năng lượng tuần hoàn giữa điện trường và từ trường làm cho điện từ lan truyền trong không gian.", "B. Sóng điện từ là quá trình biến đổi năng lượng tuần hoàn giữa điện trường và từ trường làm cho năng lượng điện từ lan truyền trong không gian.", "C. Sóng điện từ là quá trình biến đổi năng lượng giữa điện trường và từ trường làm cho điện từ lan truyền trong không gian.", "D. Sóng điện từ là quá trình biến đổi tuần hoàn giữa điện trường và từ trường làm cho điện từ lan truyền trong không gian."],a:1,e:`Sóng điện từ là quá trình biến đổi năng lượng tuần hoàn giữa điện trường và từ trường làm cho NĂNG LƯỢNG điện từ lan truyền trong không gian (phát biểu đầy đủ và chính xác nhất).`},{c:"VHF - Lý thuyết chung",q:`Sóng điện từ bao gồm mấy thành phần?`,o:["A. 1", "B. 2", "C. 3", "D. 4"],a:1,e:`Sóng điện từ gồm 2 thành phần: điện trường (E) và từ trường (H) vuông góc nhau và vuông góc với hướng truyền.`},{c:"VHF - Lý thuyết chung",q:`Các phương pháp lan truyền sóng điện từ gồm:`,o:["A. Sóng đất và sóng không gian.", "B. Sóng không gian và sóng tầng điện ly.", "C. Sóng đất, sóng không gian, sóng tầng điện ly, sóng tự do.", "D. Sóng tầng điện ly và sóng tự do."],a:2,e:`Các phương pháp lan truyền: sóng đất, sóng không gian (direct/reflected), sóng tầng điện ly và sóng tự do (free-space).`},{c:"VHF - Lý thuyết chung",q:`Một máy phát có công suất 50W thì công suất máy phát theo đơn vị dBm và dBW là bao nhiêu?`,o:["A. 15dBW và 45dBm", "B. 16dBW và 46 dBm", "C. 17 dBW và 47 dBm", "D. 18dBW và 48 dBm"],a:2,e:`50 W = 10×log(50/1) dBW ≈ 17 dBW; 17 dBW + 30 = 47 dBm.`},{c:"VHF - Lý thuyết chung",q:`Trong truyền lan sóng cực ngắn người ta sử dụng phương truyền sóng nào là phù hợp nhất?`,o:["A. Truyền sóng đất", "B. Truyền sóng không gian.", "C. Truyền sóng tầng điện ly", "D. Truyền sóng tự do"],a:1,e:`Sóng cực ngắn (VHF/UHF) truyền theo đường thẳng (line-of-sight) — sóng không gian trực tiếp phù hợp nhất.`},{c:"VHF - Lý thuyết chung",q:`Sóng điện từ là gì`,o:["A. Là từ trường lan truyền trong không gian", "B. Là trường điện từ biến thiên lan truyền trong không gian", "C. Là điện trường lan truyền trong không gian", "D. Cả 3 đáp án trên đều sai"],a:1,e:`Sóng điện từ là trường điện từ biến thiên lan truyền trong không gian.`},{c:"VHF - Lý thuyết chung",q:`Sự phân cực của sóng điện từ được xác định bởi`,o:["A. Hướng của véc tơ điện trường", "B. Hướng của véc tơ từ trường", "C. Hướng tổng hợp của hai véc tơ điện trường và từ trường", "D. Cả 3 đáp án trên đều sai"],a:0,e:`Phân cực sóng điện từ được xác định bởi hướng của véc-tơ điện trường E.`},{c:"VHF - Lý thuyết chung",q:`Một luồng E1 tiêu chuẩn có thể truyền:`,o:["A. 30 kênh thoại", "B. 32 kênh thoại", "C. 16 kênh thoại", "D. 31 kênh thoại"],a:0,e:`E1 chuẩn ITU-T G.704: 32 time-slot, trong đó TS0 đồng bộ, TS16 báo hiệu, còn 30 kênh thoại.`},{c:"VHF - Lý thuyết chung",q:`Thuật ngữ ghép kênh theo thời gian là :`,o:["A. TDM", "B. CDM", "C. FDM", "D. PDM"],a:0,e:`TDM = Time Division Multiplexing = ghép kênh theo thời gian.`},{c:"VHF - Lý thuyết chung",q:`Nguồn nhiễu nào sau đây không phải là nguồn nhiễu tự nhiên`,o:["A. Nhiễu phát sinh từ thiết bị điện tử", "B. Nhiễu ngoài Trái Đất", "C. Nhiễu bức xạ nhiệt", "D. Nhiễu hấp thụ"],a:0,e:`Nhiễu từ thiết bị điện tử là nhiễu nhân tạo (man-made), không phải nhiễu tự nhiên.`},{c:"VHF - Lý thuyết chung",q:`Suy giảm cường độ của tín hiệu phụ thuộc vào`,o:["A. Môi trường truyền dẫn", "B. Tần số truyền dẫn", "C. Khoảng cách truyền dẫn", "D. Cả a, b, c đều đúng"],a:3,e:`Suy giảm tín hiệu phụ thuộc đồng thời vào môi trường, tần số và khoảng cách — cả ba đều đúng.`},{c:"VHF - Lý thuyết chung",q:`Suy giảm tín hiệu điện từ trong môi trường không khí`,o:["A. Tỷ lệ thuận với tần số", "B. Tỷ lệ nghịch với khoảng cách", "C. Tỷ lệ thuận với bước sóng", "D. Không phụ thuộc tần số"],a:0,e:`Trong không khí, suy giảm tín hiệu điện từ tỉ lệ thuận với tần số (tần số càng cao, suy hao càng lớn).`},{c:"VHF - Lý thuyết chung",q:`Các yếu tố gây ra sự sai khác giữa tín hiệu thu và tín hiệu phát là:`,o:["A. Méo trễ lan truyền", "B. Nhiễu", "C. Sự suy giảm cường độ", "D. Cả a, b, c đều đúng"],a:3,e:`Sai khác tín hiệu thu–phát do: méo trễ lan truyền, nhiễu và suy giảm cường độ — cả ba.`},{c:"VHF - Lý thuyết chung",q:`Phát biểu nào sau đây đúng về Nhiễu nhiệt:`,o:["A. Gây ra bởi các chuyển động nhiệt của chất dẫn", "B. Không đáng kể ở nhiệt độ thường", "C. Không thể loại trừ hoàn toàn", "D. Cả a, b, c đều đúng"],a:2,e:`Nhiễu nhiệt (thermal noise) không thể loại trừ hoàn toàn ở nhiệt độ > 0 K; nó hiện diện ở mọi nhiệt độ thực tế.`},{c:"VHF - Lý thuyết chung",q:`Mối quan hệ giữa hệ số tăng ích (gain) và hệ số định hướng (Directivity) của anten là:`,o:["A. Hệ số tăng ích = Hệ số định hướng * Hiệu suất bức xạ", "B. Hệ số tăng ích = Hệ số định hướng / Hiệu suất bức xạ", "C. Hệ số tăng ích = Hiệu suất bức xạ / Hệ số định hướng", "D. Hệ số tăng ích = 1/(Hệ số định hướng * Hiệu suất bức xạ)"],a:0,e:`Gain (G) = Directivity (D) × Radiation Efficiency (η); hiệu suất bức xạ luôn ≤ 1.`},{c:"VHF - Lý thuyết chung",q:`Tỷ số giữa công suất bức xạ của anten với tổng công suất vào anten là gì?`,o:["A. Hiệu suất bức xạ", "B. Hệ số tăng ích", "C. Hiệu suất tổng", "D. Hệ số định hướng"],a:0,e:`Hiệu suất bức xạ = Công suất bức xạ / Tổng công suất vào anten.`},{c:"VHF - Lý thuyết chung",q:`Độ rộng búp sóng của anten được xác định bởi`,o:["A. Góc một phần hai công suất cực đại", "B. Tất cả đều đúng", "C. Góc một phần tư công suất cực đại", "D. Góc một phần ba công suất cực đại"],a:0,e:`Độ rộng búp sóng (beamwidth) thường xác định bởi góc tại đó công suất bằng nửa công suất cực đại (3 dB beamwidth).`},{c:"VHF - Lý thuyết chung",q:`Dải sóng dài và cực dài truyền trong không khí chủ yếu là do phương thức truyền lan nào?`,o:["A. Sóng bề mặt (sóng đất)", "B. Sóng phản xạ từ tầng điện ly", "C. Sóng trực tiếp", "D. Cả ba phương án trên"],a:0,e:`Sóng dài/cực dài truyền theo mặt đất (ground wave/surface wave) do bước sóng rất lớn, dễ nhiễu xạ qua địa hình.`},{c:"VHF - Lý thuyết chung",q:`Cần liên lạc sóng ngắn (HF) giữa hai điểm ở trên trái đất có cự ly lớn hơn (lớn hơn 500 km) chủ yếu là do phương thức truyền lan nào`,o:["A. Sóng bề mặt (sóng đất)", "B. Sóng phản xạ từ tầng điện ly", "C. Sóng trực tiếp", "D. Cả ba phương án trên"],a:1,e:`HF (sóng ngắn) truyền xa >500 km nhờ phản xạ từ tầng điện ly (ionospheric/sky wave).`},{c:"VHF - Lý thuyết chung",q:`Anten phân cực tròn khi`,o:["A. 2 thành phần ngang nhau, lệch pha 90°", "B. 2 thành phần lệch pha 45°", "C. 2 thành phần lệch pha 180°", "D. Sai"],a:0,e:`Phân cực tròn khi hai thành phần E ngang nhau và lệch pha 90°.`},{c:"VHF - Lý thuyết chung",q:`Hiệu suất anten giảm khi:`,o:["A. Điện trở suy hao tăng", "B. Trở kháng bức xạ tăng", "C. Điện kháng giảm", "D. λ giảm"],a:0,e:`Hiệu suất anten η = Rr/(Rr+Rl); khi điện trở suy hao (Rl) tăng thì hiệu suất giảm.`},{c:"VHF - Lý thuyết chung",q:`Một đường truyền có trở kháng đặc tính 𝑍0 = 50 Ωnối với tải 𝑍𝐿 = 100 Ω(tất cả thuần trở). Hệ số sóng đứng điện áp (VSWR) trên đường truyền là:`,o:["A. VSWR = 1,5", "B. VSWR = 2", "C. VSWR = 3", "D. VSWR = 4"],a:1,e:`VSWR = ZL/Z0 = 100/50 = 2 (khi ZL > Z0 và thuần trở).`},{c:"VHF - Lý thuyết chung",q:`Khoảng tần số hoạt động được gọi là`,o:["A. Beamwidth", "B. Lobe", "C. Bandwidth", "D. Cộng hưởng"],a:2,e:`Bandwidth (băng thông) là khoảng tần số hoạt động của một mạch/hệ thống.`},{c:"VHF - Lý thuyết chung",q:`Dải tần số từ 8 MHz - 16 MHz thuộc`,o:["A. Băng sóng dài", "B. Băng sóng rất dài", "C. Băng sóng trung", "D. Băng sóng ngắn"],a:3,e:`Dải 8–16 MHz thuộc băng HF (sóng ngắn, 3–30 MHz) — đây là băng sóng ngắn.`},{c:"VHF - Lý thuyết chung",q:`Sóng trung có thể truyền theo phương pháp`,o:["A. Truyền sóng đối lưu", "B. Truyền sóng điện ly và sóng đất", "C. Truyền sóng điện ly", "D. Cả 3 đáp án trên đều sai"],a:1,e:`Sóng trung (MF) truyền được cả theo sóng đất (ban ngày) lẫn sóng điện ly (ban đêm).`},{c:"VHF - Lý thuyết chung",q:`Nhiễu tần số ảnh trong máy thu thanh AM có tần số được xác định bằng`,o:["A. 2fTín hiệu + fTrung tần", "B. 2fTín hiệu + 2fTrung tần", "C. fTín hiệu + 2fTrung tần", "D.   fTín hiệu - fTrung tần"],a:2,e:`Tần số nhiễu ảnh = fTín_hiệu + 2×fTrung_tần (hoặc fTín_hiệu - 2×fTT tuỳ chiều đổi tần). Công thức chuẩn: fảnh = fts + 2×fIF.`},{c:"VHF - Lý thuyết chung",q:`Tín hiệu phát đi từ đài phát thanh là tín hiệu`,o:["A. Điều biên", "B. Cao tần đã điều chế theo âm tần", "C. Điều tần", "D. Âm tần"],a:1,e:`Đài phát thanh phát tín hiệu cao tần đã được điều chế theo âm tần (AM hoặc FM).`},{c:"VHF - Lý thuyết chung",q:`Tín hiệu AM có đặc điểm`,o:["A. Tần số sóng mang cao tần không đổi", "B. Biên độ sóng mang cao tần không đổi", "C. Pha của sóng mang cao tần thay đổi", "D. Tần số của sóng mang cao tần thay đổi"],a:0,e:`Tín hiệu AM: tần số sóng mang không đổi, biên độ thay đổi theo tín hiệu điều chế.`},{c:"VHF - Lý thuyết chung",q:`Độ nhạy của một máy thu vô tuyến (Receiver Sensitivity) được định nghĩa căn bản là gì?`,o:["A. Mức công suất phát tối đa của đài đối tác để máy thu không bị quá tải mạch đầu vào.", "B. Mức tín hiệu RF tối thiểu tại đầu vào bộ bộc lộ để máy thu có thể giải điều chế ra tín hiệu âm tần đạt chất lượng SINAD hoặc S/N quy định.", "C. Khả năng loại bỏ các tần số nhiễu kênh lân cận của mạch lọc dải thông trung tần.", "D. Tốc độ xử lý tối đa của các chip xử lý tín hiệu số DSP khi giải mã luồng thoại số."],a:1,e:`Độ nhạy máy thu là mức tín hiệu RF tối thiểu tại đầu vào để giải điều chế đạt SINAD/S/N quy định.`},{c:"VHF - Lý thuyết chung",q:`Khi xem xét thông số độ nhạy thu được ghi bằng đơn vị dBm (ví dụ: -101 dBm và -107 dBm), khẳng định nào sau đây là chính xác?`,o:["A. Máy thu có thông số -101 dBm có độ nhạy cao hơn và tốt hơn máy thu -107 dBm.", "B. Máy thu có thông số -107 dBm có độ nhạy cao hơn, có khả năng thu được tín hiệu yếu hơn từ khoảng cách xa hơn.", "C. Hai thông số này có độ nhạy tương đương nhau, chỉ khác nhau về trở kháng đầu vào.", "D. Mức chênh lệch độ nhạy giữa hai máy thu này là 6 dB, tương đương năng lực thu tín hiệu tốt hơn gấp 2 lần."],a:1,e:`Giá trị dBm âm càng nhỏ (ví dụ -107 dBm < -101 dBm) nghĩa là thu được tín hiệu yếu hơn → độ nhạy cao hơn.`},{c:"VHF - Lý thuyết chung",q:`Thuật ngữ 'Ngưỡng Squelch (Squelch Threshold)' được định nghĩa kỹ thuật như thế nào?`,o:["A. Mức biên độ tín hiệu RF tối đa mà máy thu có thể chịu đựng trước khi bị hỏng mạch đầu vào.", "B. Tần số cao nhất mà mạch lọc trung tần IF cho phép đi qua.", "C. Mức cường độ tín hiệu RF hoặc tỷ số S/N tối thiểu được cài đặt trước, mà tín hiệu thu được phải vượt qua để mạch Squelch kích mở đường âm thanh ra loa.", "D. Thời gian trễ từ khi tàu bay dừng phát sóng cho đến khi loa hoàn toàn im lặng."],a:2,e:`Squelch Threshold là mức S/N hoặc cường độ tín hiệu RF tối thiểu để mạch squelch mở đường âm thanh ra loa.`},{c:"VHF - Lý thuyết chung",q:`Trong máy thu vô tuyến điện, tách sóng trực tiếp là tín hiệu thu được sau anten được đưa`,o:["A. Ngay vào bộ tách sóng, không qua bộ khuếch đại cao tần nào", "B. Qua bộ khuếch đại cao tần trước khi vào bộ tách sóng", "C. Qua bộ tách sóng, sau đó qua bộ khuếch đại cao tần"],a:0,e:`Tách sóng trực tiếp: tín hiệu từ anten đưa thẳng vào bộ tách sóng, không qua khuếch đại cao tần.`},{c:"VHF - Lý thuyết chung",q:`Trong máy thu vô tuyến AM, yêu cầu cơ bản đối với bộ tách sóng biên độ là`,o:["A. Hệ số truyền đạt cao, trở kháng vào lớn, ít gây méo", "B. Hệ số truyền đạt cao, trở kháng vào nhỏ, ít gây méo", "C. Trở kháng vào nhỏ, ít gây méo"],a:0,e:`Bộ tách sóng AM cần hệ số truyền đạt cao, trở kháng vào lớn (không tải mạch cộng hưởng), méo nhỏ.`},{c:"VHF - Lý thuyết chung",q:`Trong máy thu phát vô tuyến AM, nếu điều chế quá mức (> 100%) thì:`,o:["A. Tín hiệu sẽ bị méo và độ rộng băng tần sẽ nhỏ hơn khi không bị quá điều chế", "B. Tín hiệu sẽ bị méo và độ rộng băng tần lớn hơn khi không bị quá điều chế", "C. Tín hiệu đầu ra máy thu sẽ rất lớn, độ rộng băng tần như khi không bị quá điều chế"],a:1,e:`Điều chế quá mức (>100%) gây méo (cắt đỉnh âm của sóng mang) và tạo ra các hài bậc cao, mở rộng băng tần.`},{c:"VHF - Lý thuyết chung",q:`Công suất tín hiệu AM gồm`,o:["A. Phần công suất hiệu ích 2 biên tần và công suất sóng mang không chứa thông tin", "B. Phần công suất hiệu ích 2 biên tần và công suất sóng mang chứa thông tin", "C. Phần công suất hiệu ích 2 biên tần", "D. Công suất sóng mang chứa thông tin"],a:0,e:`Công suất AM gồm công suất sóng mang (không chứa thông tin) và công suất 2 biên tần (chứa thông tin).`},{c:"VHF - Lý thuyết chung",q:`Bộ đàm truyền theo kiểu:`,o:["A. Simplex", "B. Half duplex", "C. Full duplex", "D. Cả 1, 2, 3 đều sai"],a:1,e:`Bộ đàm (walkie-talkie) dùng half-duplex: PTT để phát, nhả để thu, không thể đồng thời hai chiều.`},{c:"VHF - Lý thuyết chung",q:`Trong truyền dẫn, chức năng của máy phát (Transmitter) là:`,o:["A. Cung cấp dữ liệu nguồn.", "B. Biến đổi dữ liệu nguồn thành dạng có thể truyền đi được trên hệ thống truyền dẫn.", "C. Mã hóa dữ liệu nguồn", "D. Câu 2 và 3"],a:3,e:`Chức năng máy phát: biến đổi dữ liệu nguồn thành dạng truyền được (điều chế) VÀ mã hoá dữ liệu — cả câu 2 và 3.`},{c:"VHF - Lý thuyết chung",q:`Trong máy phát vô tuyến, nguyên nhân gây ra sóng phản hồi là`,o:["A. Thời tiết thay đổi ảnh hưởng đến môi trường", "B. Không có sự phối hợp trở kháng tốt giữa máy phát, phi đơ, ăng ten", "C. Công suất máy phát quá lớn"],a:1,e:`Sóng phản hồi sinh ra khi trở kháng không phối hợp giữa máy phát, feeder và anten (mismatch).`},{c:"VHF - Lý thuyết chung",q:`Độ lợi của anten (dBi) là lượng khuếch đại tín hiệu điện của anten so với:`,o:["A. Nguồn thu/phát bức xạ đẳng hướng", "B. Anten chấn tử nữa sóng", "C. Anten Parabol", "D. Anten dây"],a:0,e:`Độ lợi dBi so sánh với nguồn bức xạ đẳng hướng (isotropic radiator) — 'i' trong dBi là isotropic.`},{c:"VHF - Lý thuyết chung",q:`Chọn một trong 4 loại anten sau đây để có thể thích hợp cho việc liên lạc giữa trạm mặt đất và vệ tinh địa tĩnh`,o:["A. Anten dây sóng chạy", "B. Anten Parabol", "C. Anten loga chu kỳ", "D. Anten Yagi"],a:1,e:`Anten Parabol có búp sóng hẹp, gain cao, phù hợp liên lạc với vệ tinh địa tĩnh ở góc cố định.`},{c:"VHF - Lý thuyết chung",q:`Trở kháng vào của Anten thương mại phụ thuộc vào`,o:["A. Số chấn tử trên anten", "B. Độ dài của anten", "C. Độ dài của chấn tử lớn nhất và chấn tử bé nhất", "D. Cả A, B và C đều đúng"],a:3,e:`Trở kháng anten thương mại phụ thuộc số chấn tử, độ dài anten và tỉ lệ chiều dài chấn tử lớn/nhỏ nhất.`},{c:"VHF - Lý thuyết chung",q:`Giá trị độ lợi của anten là giá trị được áp dụng tính toán cho:`,o:["A. Toàn bộ vùng phát xạ", "B. Trong vùng cánh sóng chính", "C. Trong vùng 1/2 công suất của cánh sóng chính", "D. Tất cả đều sai"],a:2,e:`Độ lợi anten được xác định và áp dụng tính toán trong vùng nửa công suất của búp sóng chính (half-power beamwidth).`},{c:"VHF - Lý thuyết chung",q:`Khái niệm sóng trời (skywave) còn được gọi là`,o:["A. Sóng tầng điện ly (ionospheric wave)", "B. Sóng tầng đối lưu (troposphenc wave)", "C. Sóng đất (ground wave)"],a:0,e:`Sóng trời (skywave) chính là sóng tầng điện ly (ionospheric wave) bị phản xạ bởi tầng điện ly.`},{c:"VHF - Lý thuyết chung",q:`Ăng-ten là gì?`,o:["A. Là một linh kiện điện tử có thể bức xạ hoặc thu nhận sóng điện từ.", "B. Là một thiết bị có cấu tạo kim loại để thu/phát sóng điện từ.", "C. Là một thiết bị có khả năng thu/phát tín hiệu"],a:0,e:`Anten là linh kiện điện tử có thể bức xạ (phát) hoặc thu nhận sóng điện từ.`},{c:"VHF - Lý thuyết chung",q:`Hệ số tăng ích của ăng-ten thường được tính bằng gì?`,o:["A. dB", "B. Lần", "C. dBi", "D. Đáp án 1 và 3"],a:3,e:`Hệ số tăng ích anten tính bằng dB (so với anten chuẩn nửa sóng dipole) hoặc dBi (so với isotropic); cả hai đều đúng.`},{c:"VHF - Lý thuyết chung",q:`Mẫu bức xạ (hay còn được gọi là Mẫu ăng-ten) là gì?`,o:["A. Là sự biểu diễn lại tăng ích của ăng-ten theo một hướng", "B. Là sự biểu diễn lại tăng ích của ăng-ten theo mọi hướng", "C. Là một mẫu phát xạ của ăng-ten theo một hướng", "D. Là một mẫu phát xạ của ăng-ten theo mọi hướng"],a:1,e:`Mẫu bức xạ (radiation pattern/antenna pattern) biểu diễn tăng ích của anten theo mọi hướng trong không gian 3D.`},{c:"VHF - Lý thuyết chung",q:`Ăng ten có các loại phân cực nào?`,o:["A. Phân cực tuyến tính", "B. Phân cực tròn", "C. Phân cực chéo", "D. Đáp án 1 và 2"],a:3,e:`Anten có phân cực tuyến tính (đứng/ngang) và phân cực tròn; phân cực chéo là dạng hỗn hợp không phổ biến.`},{c:"VHF - Lý thuyết chung",q:`Các ăng-ten thường được thiết kế với trở kháng là bao nhiêu khi được lắp đặt với cáp đồng trục?`,o:["A. 100 Ohm", "B. 50 Ohm hoặc 75 Ohm", "C. 400 Ohm", "D. 600 Ohm"],a:1,e:`Cáp đồng trục và thiết bị RF tiêu chuẩn dùng trở kháng 50 Ω (thiết bị RF/truyền dẫn) hoặc 75 Ω (truyền hình cáp).`},{c:"VHF - Lý thuyết chung",q:`Tại giá trị VSWR bằng 1.5, khoảng bao nhiêu % công suất tới đầu cuối ăng-ten bị phản xạ lại?`,o:["A. 2%", "B. 4%", "C. 5%", "D. 11%"],a:1,e:`VSWR=1.5 → hệ số phản xạ Γ=(1.5-1)/(1.5+1)=0.5/2.5=0.2 → công suất phản xạ = |Γ|²=0.04 = 4%.`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định: Đối với Dịch vụ Kiểm soát Đường dài: Các phương tiện TT không-địa đảm bảo giữa Đơn vị cung cấp DV Kiểm soát Đường dài và tàu bay trong vùng kiểm soát:`,o:["A. Thông tin 2 chiều.", "B. Thông tin VHF điều khiển xa.", "C. Thông tin VHF có thiết bị dự phòng", "D. Thông tin HF"],a:2,e:`ICAO yêu cầu thông tin VHF A/G cho kiểm soát đường dài phải có thiết bị dự phòng.`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định: Đối với Dịch vụ Kiểm soát Tiếp cận: Các phương tiện TT không - địa đảm bảo giữa Đơn vị cung cấp DV Kiểm soát Tiếp cận và tàu bay trong vùng kiểm soát:`,o:["A. Thông tin 2 chiều.", "B. Thông tin 2 chiều, trực tiếp.", "C. Thông tin 2 chiều, trực tiếp, nhanh, liên tục, không bị nhiễu.", "D. Thông tin HF"],a:2,e:`ICAO quy định thông tin A/G cho kiểm soát tiếp cận phải hai chiều, trực tiếp, nhanh, liên tục, không bị nhiễu.`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định về đặc tính (charateristics) của hệ thống thông tin VHF A/G:`,o:["A. Tín hiệu thoại VTĐ sử dụng loại phát xạ điều chế.", "B. Điều chế biên độ, có 2 biên tần (double sideband - DSB), gọi là loại A3E.", "C. Điều chế đơn biên, có nén sóng mang (single sideband - SSB), gọi là loại J3E", "D. Cả 1, 2, 3."],a:1,e:`ICAO Annex 10: thông tin thoại VHF hàng không dùng điều biên DSB (double sideband), loại phát xạ A3E.`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định về đặc tính (characteristics) của hệ thống thông tin VHF A/G: Các tần số VTĐ sử dụng được chọn trong dải tần:`,o:["A. 117.975 - 137 MHz", "B. 117.975 - 136 MHz.", "C. 118 - 136 MHz.", "D. 118 - 130 MHz"],a:0,e:`ICAO Annex 10 Vol 3: dải tần VHF hàng không 117.975–137 MHz.`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định về đặc tính (characteristics) của hệ thống thông tin VHF A/G: Phân cực của tín hiệu phát xạ là:`,o:["A. Phân cực đứng (vertical).", "B. Phân cực ngang (horizontal).", "C. Phân cực tròn.", "D. Phân cực tròn và phân cực ngang"],a:0,e:`ICAO quy định phân cực tín hiệu VHF hàng không là phân cực đứng (vertical polarization).`},{c:"VHF - Lý thuyết chung",q:`ICAO qui định về đặc tính (characteristics) hệ thống của thông tin VHF A/G - thiết bị mặt đất: Độ ổn định tần số Phát: Tần số VTĐ thay đổi không được vượt quá:`,o:["A. +/- 0.005% của tần số ấn định.", "B. +/- 0.001% của tần số ấn định.", "C. +/- 0.002% của tần số ấn định", "D. +/- 0.008% của tần số ấn định"],a:0,e:`ICAO quy định độ ổn định tần số phát thiết bị mặt đất VHF: không vượt quá ±0.005% tần số ấn định.`},{c:"VHF - Lý thuyết chung",q:`Trong thông tin lưu động HK, theo qui định của ICAO(Annex 10, Vol.5): Đối với các loại phát xạ thoại vô tuyến (ví dụ: điều biên, đơn biên) các tần số âm thanh được giới hạn trong dải tần:`,o:["A. 300 - 2 700 Hz.", "B. 300 - 3 000 Hz.", "C. 300 - 3 400 Hz", "D. 200 - 3000Hz"],a:2,e:`ICAO Annex 10 Vol 5: dải tần âm tần cho phát xạ thoại vô tuyến: 300–3400 Hz.`},{c:"VHF - Lý thuyết chung",q:`Trong thông tin lưu động HK, theo qui định của ICAO(Annex 10, Vol.5), phân cách tối thiểu giữa các tần số VHF là:`,o:["A. 8.33 KHz.", "B. 25 KHz.", "C. 50 KHz.", "D. 75 KHz"],a:0,e:`ICAO quy định phân cách tần số tối thiểu VHF hàng không (8.33 kHz spacing) theo ICAO Annex 10.`},{c:"VHF - Lý thuyết chung",q:`Trong thông tin lưu động HK, theo qui định của ICAO(Annex 10, Vol.5), chế độ làm việc trong dải VHF là:`,o:["A. 1 kênh đơn công (Single channel simplex).", "B. 2 kênh đơn công (Dual channel Simplex).", "C. 1 kênh song công (Single channel Duplex).", "D. Phương án khác"],a:0,e:`ICAO quy định chế độ làm việc VHF hàng không: 1 kênh đơn công (single channel simplex).`},{c:"VHF - Lý thuyết chung",q:`ICAO quy định công suất bức xạ hiệu dụng phải đủ để tạo ra cường độ trường tối thiểu quy định tại ranh giới vùng phủ sóng đối với thoại VHF hàng không đường dài là bao nhiêu dựa trên sự lan truyền trong không gian tự do.`,o:["A. 70μV/m", "B. 75μV/m", "C. 80μV/m", "D. 90μV/m"],a:0,e:`ICAO quy định cường độ trường tối thiểu tại ranh giới vùng phủ sóng VHF đường dài: 70 μV/m.`},{c:"VHF - Lý thuyết chung",q:`Theo tài liệu ICAO, độ giãn cách kênh 8.33 kHz được áp dụng nhằm mục đích gì?`,o:["A. Để tăng số lượng kênh tần số sẵn có trong băng tần VHF hàng không.", "B. Để giảm giá thành thiết bị thu phát.", "C. Để tăng công suất phát của đài.", "D. Để làm cho thiết bị máy thu đơn giản hơn."],a:0,e:`Giãn kênh 8.33 kHz được áp dụng để tăng số lượng kênh tần số khả dụng trong băng tần VHF hàng không.`},{c:"VHF - Lý thuyết chung",q:`Khi muốn đo công suất phát xạ của máy phát VHF người ta cần dùng:`,o:["A. Máy đo công suất", "B. Máy phân tích phổ", "C. Máy kiểm tra âm tần (ATS)"],a:0,e:`Đo công suất phát của máy phát VHF cần máy đo công suất RF (Wattmeter/Power meter).`},{c:"VHF - Lý thuyết chung",q:`Khi muốn đo ngưỡng thu của máy thu VHF người ta cần dùng:`,o:["A. Máy kiểm tra âm tần (ATS)", "B. Máy phát tín hiệu chuẩn", "C. Máy đo công suất"],a:1,e:`Đo ngưỡng thu (độ nhạy) máy thu VHF cần máy phát tín hiệu chuẩn (Signal Generator/RF Generator).`},{c:"VHF - Lý thuyết chung",q:`Khi chọn củ đo công suất, người ta phải chú ý những thông số gì?`,o:["A. Dải tần đo", "B. Mức công suất tối đa", "C. Cả 1 và 2"],a:2,e:`Khi chọn củ đo (element/sensor) cần lưu ý cả dải tần đo và mức công suất tối đa của củ đo.`},{c:"VHF - Lý thuyết chung",q:`Khi đo công suất phát xạ của 1 máy phát VHF công suất 50W, người ta dùng Sensor 100W và dải tần 118 MHz-137 MHz có được không?`,o:["A. Không", "B. Có", "C."],a:1,e:`Sensor 100 W dải tần 118–137 MHz phù hợp để đo máy phát 50 W VHF (50 W < 100 W, tần số trong dải).`},{c:"VHF - Lý thuyết chung",q:`Khi đo công suất phát xạ của máy phát VHF người ta đấu nối:.`,o:["A. Máy phát-Anten-Máy đo công suất", "B. Máy phát-Máy đo công suất- Anten", "C. Máy phát-Máy phân tích phổ-Anten"],a:1,e:`Đo công suất phát: Máy phát → Wattmeter (power meter) → Anten (hoặc tải giả).`},{c:"VHF - Lý thuyết chung",q:`Khi đo ngưỡng thu của máy thu VHF người ta đấu nối:`,o:["A. Máy thu-Máy phát tín hiệu chuẩn-Anten", "B. Máy thu-Anten-Máy phát tín hiệu chuẩn", "C. Máy thu-Máy phát tín hiệu chuẩn"],a:2,e:`Đo ngưỡng thu: Máy phát tín hiệu chuẩn → Máy thu (anten được thay bằng RF generator).`},{c:"VHF - Lý thuyết chung",q:`Khi đo hệ số sóng đứng của 1 máy phát VHF được kết quả là 3 thì:`,o:["A. Phối hợp trở kháng giữa máy phát và anten là tốt", "B. Phối hợp trở kháng giữa máy phát và anten là kém", "C. Phối hợp trở kháng giữa máy phát và anten là bình thường"],a:1,e:`VSWR = 3 cho thấy phối hợp trở kháng kém (VSWR lý tưởng = 1; VSWR > 2 thường được coi là kém).`},{c:"VHF - Lý thuyết chung",q:`Các máy phát VHF có thể key máy liên tục trong 1 thời gian dài được không?`,o:["A. Không", "B. Có", "C."],a:0,e:`Không — máy phát VHF không được key liên tục trong thời gian dài vì sẽ quá nhiệt và hỏng PA.`},{c:"VHF - Lý thuyết chung",q:`Khi tiến hành đo độ sâu điều chế của máy phát VHF, người có thể dùng:`,o:["A. Máy đo công suất", "B. Máy phân tích phổ", "C. Máy đo độ sâu điều chế", "D. Cả 2 và 3"],a:3,e:`Đo độ sâu điều chế có thể dùng máy phân tích phổ hoặc máy đo độ sâu điều chế chuyên dụng.`},{c:"VHF - Lý thuyết chung",q:`1 máy phát VHF đo được công suất phát xạ là 25W, khi đo công suất phản hồi được 1W thì hệ số sóng đứng bằng:`,o:["A. 1.2", "B. 1.5", "C. 2"],a:1,e:`Pf=25W, Pr=1W → Γ=√(1/25)=0.2 → VSWR=(1+0.2)/(1-0.2)=1.2/0.8=1.5.`},{c:"VHF - Lý thuyết chung",q:`1 máy phát VHF có công suất phát xạ là 50W, suy hao của feeder là 2 dB thì công suất lên anten là:`,o:["A. 47dBm", "B. 45dBm", "C. 49dBm"],a:0,e:`50 W = 47 dBm; suy hao feeder 2 dB → công suất lên anten = 47 - 2 = 45 dBm.`},{c:"VHF - Lý thuyết chung",q:`Khi muốn đo mức âm tần phát ra từ máy thu, người ta dùng`,o:["A. Máy kiểm tra âm tần (ATS)", "B. Máy đo công suất", "C. Đồng hồ vạn năng"],a:0,e:`Đo mức âm tần đầu ra máy thu dùng máy kiểm tra âm tần (Audio Test Set - ATS).`},{c:"VHF - Lý thuyết chung",q:`Khi muốn key máy phát VHF ta phải:`,o:["A. Chập chân PTT của máy vào đất", "B. Đưa âm tần vào máy", "C. Chập chân Select Tx vào đất"],a:0,e:`Key máy phát VHF bằng cách chập chân PTT (Push-to-Talk) xuống đất (GND).`},{c:"VHF - Lý thuyết chung",q:`Ta có thể tạo ra tín hiệu Squelch từ máy thu có ngõ ra SQL để kiểm tra không?`,o:["A. Có", "B. Không", "C."],a:0,e:`Có — tín hiệu Squelch (SQL) từ máy thu có thể dùng để kiểm tra mạch squelch và điều khiển relay.`},{c:"VHF - Lý thuyết chung",q:`Với mô hình dùng chung anten cho 1 cặp máy thu, phát VHF (1 máy thu, 1 máy phát) thì cần phải dùng mấy rơle để điều khiển:`,o:["A. 1", "B. 2", "C. 3"],a:1,e:`Cần 2 relay: 1 relay chuyển anten phát (TX antenna relay) và 1 relay chuyển anten thu (RX antenna relay).`},{c:"VHF - Lý thuyết chung",q:`Trong mô hình sử dụng 1 cặp máy phát main và standby thì cổng NO trên rơle anten được nối đến máy phát:`,o:["A. Main", "B. Standby", "C."],a:0,e:`Cổng NO (Normally Open) nối đến máy phát Main — khi relay không kích, main được kết nối.`},{c:"VHF - Lý thuyết chung",q:`Trong mô hình sử dụng 1cặp máy phát main và standby thì cổng NC trên rơle anten được nối đến máy phát:`,o:["A. Main", "B. Standby", "C."],a:1,e:`Cổng NC (Normally Closed) nối đến máy phát Standby — khi relay kích, standby được kết nối.`},{c:"VHF - Lý thuyết chung",q:`Nguồn cấp cho rơle anten là nguồn:`,o:["A. DC", "B. AC", "C."],a:0,e:`Relay anten (antenna changeover relay) được cấp nguồn DC để điều khiển cuộn dây relay.`},{c:"VHF - Lý thuyết chung",q:`Trên rơle anten cổng COM được nối đến:`,o:["A. Máy phát main", "B. Máy phát standby", "C. Anten phát"],a:2,e:`Cổng COM (common) của relay anten nối đến anten phát — đây là cổng chung kết nối anten.`},{c:"VHF - Lý thuyết chung",q:`Khi muốn kiểm tra tín hiệu thu được từ anten trước khi đưa vào máy thu người ta sử dụng:`,o:["A. Máy phân tích phổ", "B. Máy hiện sóng", "C. Máy kiểm tra âm tần (ATS)"],a:0,e:`Kiểm tra tín hiệu thu từ anten trước khi vào máy thu dùng máy phân tích phổ (spectrum analyzer).`},{c:"VHF - Lý thuyết chung",q:`Khi muốn đo mức tín hiệu trước khi đưa vào máy phát người ta sử dụng:`,o:["A. Đồng hồ vạn năng", "B. Máy đo công suất", "C. Máy kiểm tra âm tần (ATS)"],a:2,e:`Đo mức tín hiệu âm tần trước khi đưa vào máy phát dùng máy kiểm tra âm tần (ATS).`},{c:"VHF - Lý thuyết chung",q:`Bộ lọc phát được lắp ở vị trí nào?`,o:["A. Giữa máy phát và anten phát", "B. Trước đầu vào máy phát", "C. Sau anten phát"],a:0,e:`Bộ lọc phát lắp giữa máy phát và anten phát để lọc sóng hài và tạp nhiễu ngoài băng.`},{c:"VHF - Lý thuyết chung",q:`Bộ lọc thu được lắp ở vị trí nào?`,o:["A. Sau máy thu", "B. Giữa anten thu và máy thu", "C. Trước anten thu"],a:1,e:`Bộ lọc thu lắp giữa anten thu và máy thu để lọc nhiễu ngoài băng trước khi vào máy thu.`},{c:"VHF - Lý thuyết chung",q:`Bộ lọc phát/thu dùng trong hệ thống VHF là:`,o:["A. Lọc thông cao", "B. Lọc thông thấp", "C. Lọc thông dải", "D. Lọc chắn dải"],a:2,e:`Bộ lọc phát/thu trong hệ thống VHF là lọc thông dải (band-pass filter) cho phép dải tần VHF đi qua.`},{c:"VHF - Lý thuyết chung",q:`1W tương ứng với:`,o:["A. 30dBm", "B. -30dBm", "C. 0dBm"],a:0,e:`1 W = 10×log(1000 mW) = 10×3 = 30 dBm.`},{c:"VHF - Lý thuyết chung",q:`Máy phát VHF A có công suất phát xạ là 50W, suy hao do feeder là 3 dB. Máy phát VHF B có công suất phát xạ là 25W, suy hao do feeder là 1 dB. Hai máy VHF sử dụng cùng một loại anten phát. Vậy công suất phát xạ ra môi trường của:`,o:["A. Máy A lớn hơn máy B", "B. Máy A bằng máy B", "C. Máy A nhỏ hơn máy B"],a:0,e:`Máy A: 50W=47dBm, suy hao 3dB → 44dBm (~25W) lên anten. Máy B: 25W=44dBm, suy hao 1dB → 43dBm (~20W) lên anten. Máy A lớn hơn máy B.`},{c:"VHF - Lý thuyết chung",q:`Máy thu VHF A có mức mở máy thu khi tắt SQL là -107 dBm. Máy thu VHF B có mức mở máy thu là -105 dBm. Khi tín hiệu âm tần thu được có cùng tỷ số S/N, máy thu A:`,o:["A. Có độ nhạy kém hơn máy thu B", "B. Có độ nhạy tốt hơn máy thu B", "C. Có độ nhạy bằng máy thu B"],a:1,e:`Máy thu A có ngưỡng -107 dBm (nhỏ hơn -105 dBm) → thu được tín hiệu yếu hơn → độ nhạy tốt hơn.`},{c:"VHF - Lý thuyết chung",q:`Khi muốn kiểm tra nguồn cấp cho máy VHF người ta dùng:`,o:["A. Máy đo công suất", "B. Đồng hồ vạn năng", "C. Máy phân tích phổ"],a:1,e:`Đo nguồn cấp điện áp DC cho máy VHF dùng đồng hồ vạn năng (multimeter).`},{c:"VHF - Lý thuyết chung",q:`Trên rơle anten, bình thường cổng COM sẽ thông với cổng:`,o:["A. Cổng NO", "B. Cổng NC", "C."],a:1,e:`Bình thường (relay không kích): cổng COM thông với cổng NC (Normally Closed).`},{c:"VHF - Lý thuyết chung",q:`Trên rơle anten, khi chọn sang máy standby thì cổng COM sẽ thông với cổng:`,o:["A. Cổng NO", "B. Cổng NC", "C."],a:0,e:`Khi chọn máy standby (relay kích): cổng COM thông với cổng NO (Normally Open).`},{c:"VHF - Lý thuyết chung",q:`Chân tín hiệu PTT của máy phát VHF không sử dụng nguồn key bên ngoài có điện áp hay không?`,o:["A. Có", "B. Không", "C."],a:0,e:`Có — chân PTT của máy phát VHF có điện áp nội (thường +5V hoặc +12V); không cần nguồn ngoài.`},{c:"VHF - Lý thuyết chung",q:`Tín hiệu nào dùng để điều khiển rơle chuyển mạch anten?`,o:["A. Tín hiệu Select", "B. Tín hiệu Tx", "C. Tín hiệu Rx"],a:0,e:`Tín hiệu Select dùng để điều khiển relay chuyển mạch anten (chọn máy main/standby).`},{c:"VHF - Lý thuyết chung",q:`Dải tần của sóng VHF:`,o:["A. Từ 300-3000 MHz", "B. Từ 30-300 MHz", "C. Từ 3-30 MHz"],a:1,e:`VHF (Very High Frequency): dải tần 30–300 MHz.`},{c:"VHF - Lý thuyết chung",q:`Tín hiệu điều khiển để mở máy phát là:`,o:["A. Tín hiệu PTT", "B. Tín hiệu Tx", "C. Tín hiệu Select"],a:0,e:`Tín hiệu PTT (Push-to-Talk) là tín hiệu điều khiển mở máy phát (key transmitter).`},{c:"VHF - Lý thuyết chung",q:`Khi thu được tín hiệu lớn hơn độ nhạy máy thu, máy thu sẽ đưa ra tín hiệu điều khiển gì?`,o:["A. Tín hiệu PTT", "B. Tín hiệu Squelch", "C. Tín hiệu Select"],a:1,e:`Khi tín hiệu thu đủ mạnh, máy thu phát ra tín hiệu Squelch (mở loa/audio output).`},{c:"VHF - Lý thuyết chung",q:`Trình bày các thao tác để đo công suất phát của 1 máy phát VHF`,o:["A. Gắn Wattmeter giữa máy phát và anten (hoặc tải giả); chọn loại element phù hợp và xoay mũi tên trên element hướng ra anten; Key máy phát đồng thời đọc giá trị đo được.", "B. Gắn Wattmeter giữa máy phát và anten (hoặc tải giả); Key máy phát đồng thời đọc giá trị đo được.", "C. Gắn Wattmeter vào ngõ ra máy phát không cần anten (hoặc tải giả); chọn loại và xoay hướng element phù hợp; Key máy phát đồng thời đọc giá trị đo được."],a:0,e:`Đo công suất phát: gắn Wattmeter giữa máy phát và anten/tải giả, chọn element phù hợp, xoay mũi tên hướng ra anten, key máy và đọc giá trị.`},{c:"VHF - Lý thuyết chung",q:`Trình bày các thao tác để đo công suất sóng dội của 1 máy phát VHF`,o:["A. Gắn Wattmeter giữa máy phát và anten (hoặc tải giả); chọn loại element phù hợp và xoay mũi tên trên element hướng vào máy phát; Key máy phát đồng thời đọc giá trị đo được.", "B. Gắn Wattmeter giữa máy phát và anten (hoặc tải giả); Key máy phát đồng thời đọc giá trị đo được.", "C. Gắn Wattmeter vào ngõ ra máy phát không cần anten (hoặc tải giả); chọn loại và xoay hướng element phù hợp; Key máy phát đồng thời đọc giá trị đo được."],a:0,e:`Đo công suất sóng dội: gắn Wattmeter giữa máy phát và anten/tải giả, chọn element phù hợp, xoay mũi tên hướng VÀO máy phát, key và đọc giá trị.`},{c:"VHF - Lý thuyết chung",q:`Trình bày các thao tác để đo tần số phát của 1 máy phát VHF có công suất 50W`,o:["A. Gắn element có suy hao 50dB vào giữa máy phát và máy đo tần số; Key máy phát đồng thời đọc giá trị đo được trên máy đo tần số .", "B. Gắn Wattmeter giữa máy phát và anten (hoặc tải giả); Key máy phát đồng thời đọc giá trị đo được.", "C. Gắn Wattmeter vào ngõ ra máy phát không cần anten (hoặc tải giả); gắn element có suy hao 50dB vào Wattmeter để trích xuất tín hiệu đưa vào máy đo tần số; Key máy phát đồng thời đọc giá trị đo được."],a:2,e:`Đo tần số máy phát 50 W: dùng Wattmeter làm tải giả kết hợp element suy hao 50 dB để trích tín hiệu nhỏ đưa vào máy đếm tần số.`},{c:"VHF - Lý thuyết chung",q:`Trình bày các thao tác để đo độ nhạy của 1 máy thu VHF`,o:["A. Gắn máy phát sóng RF tới ngõ vào anten máy thu và máy đo SINAD vào line thoại thu của máy VHF; Chỉnh thông số máy phát RF phù hợp; Tăng dần biên độ RF cho tới khi giá trị SINAD đo được vẫn đảm bảo theo tiêu chuẩn kỹ thuật; Đọc giá trị trên máy phát RF", "B. Gắn máy phát sóng RF tới ngõ vào anten máy thu; Chỉnh thông số máy phát RF phù hợp; Đọc giá trị trên máy phát RF", "C. Gắn máy phát sóng RF tới ngõ vào anten máy thu và máy đo SINAD vào line thoại thu của máy VHF; Chỉnh thông số máy phát RF phù hợp; Giảm dần biên độ RF cho tới khi giá trị SINAD đo được vẫn đảm bảo theo tiêu chuẩn kỹ thuật"],a:2,e:`Đo độ nhạy máy thu: kết nối RF generator → anten input, ATS → audio output; giảm dần biên độ RF đến khi SINAD vừa đạt chuẩn và đọc mức RF đó.`},{c:"VHF - Lý thuyết chung",q:`Để đo hệ số điều chế máy phát VHF, người ta sử dụng công cụ đo lường nào`,o:["A. Modulation meter", "B. Audio analyzer", "C. Frequency counter", "D. Cả 1 và 2 đều đúng"],a:3,e:`Đo hệ số điều chế (modulation depth) dùng Modulation meter hoặc Audio analyzer — cả hai đều dùng được.`},{c:"VHF - Lý thuyết chung",q:`Thao tác cần thực hiện trước nhất khi một máy phát VHF bị hỏng`,o:["A. Kiểm tra, sửa chữa", "B. Báo cáo lên cấp trên", "C. Chuyển sang máy phát VHF dự phòng để duy trì thông tin liên lạc", "D. Cả 1, 2, 3 đều sai"],a:2,e:`Ưu tiên đầu tiên khi máy phát VHF hỏng: chuyển ngay sang máy dự phòng để duy trì liên lạc an toàn bay.`},{c:"VHF - Lý thuyết chung",q:`Thông số cần kiểm tra khi cự ly liên lạc máy phát VHF bị giảm`,o:["A. Công suất sóng tới, công suất phản hồi, âm tần đưa vào máy phát", "B. Tần số máy phát", "C. Điện áp cung cấp cho máy phát", "D. Cả 1, 2, 3 đều sai"],a:0,e:`Khi cự ly liên lạc giảm cần kiểm tra: công suất sóng tới, công suất phản hồi (VSWR) và mức âm tần vào máy phát.`},{c:"VHF - Lý thuyết chung",q:`Khắc phục sự cố không có điện áp (AC hoặc DC. cung cấp cho máy thu/phát VHF`,o:["A. Nhanh chóng chuyển sang máy thu/phát VHF dự phòng để duy trì thông tin liên lạc", "B. Kiểm tra nguồn cấp, cầu chì, thay thế nếu cần", "C. Kết hợp cả 1 và 2"],a:2,e:`Khắc phục mất nguồn máy VHF: kết hợp chuyển ngay sang máy dự phòng VÀ kiểm tra/sửa nguồn, cầu chì.`},{c:"VHF - Lý thuyết chung",q:`Mạch Squelch trong máy thu VHF AM hàng không có chức năng quan trọng nào sau đây?`,o:["A. Tự động tăng độ nhạy máy thu khi có bão từ", "B. Khóa đường ra âm tần của máy thu khi không có tín hiệu sóng mang đủ mạnh từ tàu bay, tránh tiếng rít nhiễu nền liên tục ra loa của KSVKL", "C. Giới hạn biên độ tín hiệu thoại không vượt quá mức cho phép", "D. Đồng bộ tần số giữa máy thu mặt đất và máy phát trên tàu bay"],a:1,e:`Squelch khoá đường ra âm tần khi không có tín hiệu đủ mạnh, tránh tiếng rít nhiễu nền liên tục ra loa KSVKL.`},{c:"VHF - Lý thuyết chung",q:`Thiết bị Bộ lọc được lắp đặt giữa máy phát VHF và hệ thống Ăng ten tại các đài trạm nhằm mục đích gì?`,o:["A. Tăng hệ số tăng ích (Gain) của Ăng ten phát", "B. Lọc dải thông cực hẹp để triệt tiêu các thành phần tần số nhiễu ngoài băng và ngăn chặn năng lượng từ máy phát khác rò sang gây nhiễu xuyên điều chế", "C. Biến đổi trở kháng từ vô hạn về 50 Ohm", "D. Ổn định điện áp DC cung cấp cho card điều khiển máy phát"],a:1,e:`Bộ lọc giữa máy phát và anten lọc dải hẹp, triệt thành phần ngoài băng và ngăn năng lượng từ máy phát khác rò sang gây nhiễu xuyên điều chế.`},{c:"VHF - Lý thuyết chung",q:`Khoảng cách giãn kênh (Channel Spacing) tiêu chuẩn hiện nay đang áp dụng phổ biến tại vùng thông báo bay (FIR) của Việt Nam đối với hệ thống thoại VHF là bao nhiêu?`,o:["A. 50 kHz", "B. 25 kHz", "C. 8.33 kHz", "D. 12.5 kHz"],a:1,e:`Việt Nam hiện áp dụng phổ biến giãn kênh 25 kHz trong FIR HCM và FIR Hà Nội.`},{c:"VHF - Lý thuyết chung",q:`Thành phần Mạch điểu khiển độ khuếch đại tự động (AGC) trong cấu trúc máy thu VHF có vai trò cốt lõi nào?`,o:["A. Giúp mức âm tần đầu ra tương đối đồng đều", "B. Dùng để tăng gấp đôi tần số hoạt động của hệ thống", "C. Dùng để chuyển đổi dòng xoay chiều AC thành dòng một chiều DC", "D. Không có vai trò gì quan trọng trong khai thác"],a:0,e:`AGC (Automatic Gain Control) giữ mức âm tần đầu ra tương đối ổn định khi cường độ tín hiệu thu thay đổi.`},{c:"VHF - Lý thuyết chung",q:`Chức năng bộ ghép nối Combiner trong cấu trúc hệ thống VHF hàng không có vai trò cốt lõi nào`,o:["A. Dùng để tăng gấp đôi tần số hoạt động của hệ thống", "B. Dùng để chuyển đổi dòng xoay chiều AC thành dòng một chiều DC", "C. Dùng để cho phép nhiều máy phát hoạt động ở các tần số khác nhau dùng chung một Ăng ten phát duy nhất.", "D. Không có vai trò gì quan trọng trong khai thác"],a:2,e:`Combiner cho phép nhiều máy phát hoạt động ở tần số khác nhau cùng dùng chung một anten phát duy nhất.`},{c:"VHF - Lý thuyết chung",q:`Nếu kỹ sư đài trạm cài đặt cấu hình ngưỡng Squelch quá cao so với tiêu chuẩn, hệ thống đài thoại VHF sẽ gặp phải hiện tượng gì?`,o:["A. Máy thu có nguy cơ bỏ sót các cuộc gọi từ tàu bay ở rất xa, tàu bay bay thấp hoặc các tín hiệu khẩn nguy có công suất yếu.", "B. Ăng ten của đài trạm sẽ tự động chuyển đổi hướng búp sóng về phía tàu bay mạnh nhất.", "C. Máy thu sẽ liên tục mở tiếng xèo xèo ra loa dù không có tàu bay nào gọi.", "D. Băng thông của kênh thoại sẽ bị thu hẹp lại từ 25 kHz xuống 8.33 kHz."],a:0,e:`Ngưỡng squelch quá cao → máy thu không mở loa với tín hiệu yếu → bỏ sót cuộc gọi từ tàu bay xa/thấp/khẩn nguy.`},{c:"VHF - Lý thuyết chung",q:`Vì sao cấu trúc của cáp đồng trục lại có tên gọi là 'Đồng trục' (Coaxial)?`,o:["A. Vì cáp chỉ hoạt động khi được đấu nối đồng thời vào hai máy thu phát khác nhau.", "B. Vì lõi dẫn trung tâm và lưới màn chắn kim loại có cùng chung một trục đối xứng hình học.", "C. Vì tốc độ truyền tải dòng điện trong lõi và lưới bằng đúng tốc độ ánh sáng.", "D. Vì cáp được làm hoàn toàn từ vật liệu đồng nguyên chất từ lõi ra đến vỏ ngoài."],a:1,e:`'Đồng trục' (Coaxial) vì lõi dẫn trung tâm và lưới màn chắn có cùng trục đối xứng hình học (co-axial = cùng trục).`},{c:"VHF - Lý thuyết chung",q:`Trở kháng đặc tính tiêu chuẩn của hệ thống cáp đồng trục (Feeder, Jumper) và đầu nối (Connector) dùng trong ngành viễn thông vô tuyến và hàng không VHF là bao nhiêu?`,o:["B. 50 Ohm", "A. 75 Ohm", "C. 100 Ohm", "D. 600 Ohm"],a:1,e:`Cáp đồng trục và đầu nối dùng trong vô tuyến/hàng không VHF có trở kháng tiêu chuẩn 50 Ω.`},{c:"VHF - Lý thuyết chung",q:`Thành phần cấu tạo nào bên trong cáp đồng trục đóng vai trò trực tiếp quyết định giá trị trở kháng đặc tính (Characteristic Impedance) của sợi cáp đó?`,o:["A. Màu sắc và độ dày của lớp vỏ bảo vệ ngoài cùng", "B. Đường kính lõi trong, đường kính trong của lưới chắn và hằng số điện môi của lớp cách điện.", "C. Chiều dài tổng thể của đoạn cáp Feeder khi kéo từ phòng máy lên tháp anten.", "D. Mức công suất cực đại phát ra từ máy phát VHF."],a:1,e:`Trở kháng đặc tính cáp đồng trục phụ thuộc vào đường kính lõi trong, đường kính trong lưới chắn và hằng số điện môi lớp cách điện.`},{c:"VHF - Lý thuyết chung",q:`Khi tần số hoạt động của tín hiệu truyền trong cáp đồng trục tăng lên, thông số suy hao (Attenuation) của cáp sẽ thay đổi như thế nào?`,o:["A. Suy hao giữ nguyên không đổi vì cáp đồng trục có dải thông phẳng tuyệt đối.", "B. Suy hao giảm đi đáng kể do tần số cao giúp sóng lan truyền nhanh hơn.", "C. Suy hao tăng lên (do tổn hao điện trở bề mặt tăng và tổn hao phân cực điện môi tăng).", "D. Suy hao biến đổi liên tục theo đồ thị hình sin tùy thuộc vào độ ẩm không khí bên ngoài."],a:2,e:`Suy hao cáp đồng trục tăng khi tần số tăng (tổn hao điện trở bề mặt và tổn hao điện môi đều tăng theo tần số).`},{c:"VHF - Lý thuyết chung",q:`Khi thi công kéo cáp Feeder đồng trục (loại lớn như 7/8 inch) từ phòng máy lên cột ăng ten, thông số giới hạn vật lý nào cần phải tuân thủ nghiêm ngặt để tránh làm hỏng cấu trúc cáp?`,o:["A. Bán kính uốn cong tối thiểu (Minimum Bending Radius).", "B. Tổng trọng lượng của cuộn cáp nguyên đai nguyên kiện.", "C. Nhiệt độ sôi của lớp vỏ bọc nhựa PVC ngoại vi.", "D. Độ sâu chôn cáp tối đa dưới lòng đất khi qua mương cáp."],a:0,e:`Khi kéo cáp đồng trục cần tuân thủ bán kính uốn cong tối thiểu (Minimum Bending Radius) để tránh biến dạng cấu trúc cáp.`},{c:"VHF - Lý thuyết chung",q:`Hiện tượng gì sẽ xảy ra tại điểm đấu nối nếu nước mưa lọt vào bên trong lớp lưới và lớp cách điện của cáp đồng trục (hiện tượng cáp ngậm nước)?`,o:["A. Trở kháng đặc tính của cáp sẽ tăng lên gấp đôi, làm tăng công suất phát.", "B. Hằng số điện môi thay đổi, suy hao của cáp tăng vọt đồng thời tạo ra sự mất phối hợp trở kháng nghiêm trọng gây tăng hệ số sóng đứng VSWR.", "C. Cáp sẽ tự động chuyển thành Ăng ten bức xạ đẳng hướng.", "D. Mạch bảo vệ quá tải của máy phát VHF sẽ tự động tắt nguồn cấp AC đầu vào tháp."],a:1,e:`Cáp ngậm nước: hằng số điện môi thay đổi → suy hao tăng vọt và mất phối hợp trở kháng → tăng VSWR nghiêm trọng.`},{c:"VHF - Lý thuyết chung",q:`Loại đầu nối (Connector) đồng trục nào sau đây thường được sử dụng phổ biến nhất ở đầu cáp Feeder của hệ thống anten thoại VHF hàng không mặt đất do khả năng chịu công suất tốt và chống chịu thời tiết ổn định?`,o:["A. Đầu nối RJ-45", "B. Đầu nối loại N (N-Type Connector)", "C. Đầu nối BNC", "D. Đầu nối SMA"],a:1,e:`Đầu nối loại N (N-Type) được dùng phổ biến nhất ở đầu cáp Feeder VHF hàng không vì chịu công suất tốt và bền thời tiết.`},{c:"VHF - Lý thuyết chung",q:`Để kết nối máy VHF với ăng ten, sử dụng loại cáp nào sau đây`,o:["A. Cáp quang", "B. Cáp điện thoại", "C. Cáp Lan", "D. Cáp đồng trục"],a:3,e:`Kết nối máy VHF với anten dùng cáp đồng trục (coaxial cable) có trở kháng 50 Ω.`},{c:"VHF - Lý thuyết chung",q:`Nguyên nhân chính dẫn đến nhiễu xuyên điều chế tại các trạm phát VHF có mật độ kênh dày đặc là gì?`,o:["A. Do cáp đồng trục bị ẩm", "B. Do tín hiệu từ hai hoặc nhiều máy phát trộn lẫn trong tầng khuếch đại công suất (PA) của máy phát.", "C. Khi độ nhạy máy thu quá cao.", "D. Khi ăng ten bị hỏng lớp bảo vệ."],a:2,e:`Nhiễu xuyên điều chế sinh ra khi tín hiệu từ nhiều máy phát trộn lẫn trong tầng khuếch đại công suất (PA) phi tuyến.`},{c:"VHF - Lý thuyết chung",q:`Để giảm thiểu nhiễu xuyên điều chế, biện pháp nào sau đây là hiệu quả nhất?`,o:["A. Tăng công suất phát tối đa.", "B. Sử dụng bộ lọc dải thông (Band-pass filter) và bộ cách ly (Isolator) ở đầu ra máy phát.", "C. Giảm chiều dài cáp Feeder.", "D. Sử dụng ăng ten loại đẳng hướng."],a:1,e:`Giảm nhiễu xuyên điều chế hiệu quả nhất bằng bộ lọc dải thông và bộ cách ly (Isolator) ở đầu ra máy phát.`},{c:"VHF - Lý thuyết chung",q:`Tại sao các trạm phát VHF hàng không đặt gần nhau dễ bị nhiễu xuyên điều chế?`,o:["A. Vì tần số phát quá gần nhau.", "B. Do sóng phản xạ từ tòa nhà.", "C. Do tín hiệu phát của trạm này lọt vào tầng khuếch đại của trạm kia.", "D. Do độ ẩm không khí."],a:2,e:`Các trạm VHF gần nhau: tín hiệu phát của trạm này lọt vào đầu vào PA của trạm kia gây trộn phi tuyến → nhiễu xuyên điều chế.`},{c:"VHF - Lý thuyết chung",q:`Hệ số sóng đứng (VSWR) lý tưởng nhất của một hệ thống ăng ten là bao nhiêu?`,o:["A. 1:1.", "B. 2:1.", "C. 5:1.", "D. 10:1."],a:0,e:`VSWR = 1:1 là lý tưởng nhất, nghĩa là toàn bộ công suất được bức xạ, không có phản xạ.`},{c:"VHF - Lý thuyết chung",q:`Điều gì xảy ra nếu VSWR quá cao (ví dụ > 3:1)?`,o:["A. Năng lượng phản xạ lớn về máy phát, gây nóng và có thể làm hỏng bộ khuếch đại công suất.", "B. Âm thanh thoại rõ hơn.", "C. Sóng vô tuyến truyền xa hơn.", "D. Ăng ten tự động sửa lỗi."],a:0,e:`VSWR cao → công suất phản xạ lớn quay về PA → PA quá nhiệt, có thể hỏng bộ khuếch đại công suất.`},{c:"VHF - Lý thuyết chung",q:`Yếu tố nào sau đây ảnh hưởng lớn nhất đến khoảng cách phủ sóng VHF hàng không?`,o:["A. Độ ẩm.", "B. Chiều cao ăng ten và tầm nhìn thẳng (Line of Sight).", "C. Màu sắc ăng ten.", "D. Tốc độ gió."],a:1,e:`Phủ sóng VHF (LOS) phụ thuộc chủ yếu vào chiều cao anten và tầm nhìn thẳng (Line of Sight).`},{c:"VHF - Lý thuyết chung",q:`Mạch giải điều chế AM (AM Detector) thực hiện chức năng gì?`,o:["A. Tăng công suất.", "B. Tách tín hiệu âm tần (audio) ra khỏi sóng mang cao tần (RF).", "C. Lọc nhiễu.", "D. Ổn định điện áp."],a:1,e:`Mạch giải điều chế AM tách tín hiệu âm tần ra khỏi sóng mang cao tần RF.`},{c:"VHF - Lý thuyết chung",q:`Hiện tượng "Fading" (thăng trầm tín hiệu) trong truyền dẫn VHF hàng không chủ yếu gây ra bởi:`,o:["A. Nhiệt độ của máy phát quá cao.", "B. Do cáp đồng trục bị ngắn.", "C. Sự phản xạ tín hiệu từ các bề mặt (tòa nhà, địa hình) tạo ra các đường truyền tín hiệu khác nhau đến máy thu.", "D. Do tần số VHF quá thấp."],a:2,e:`Fading VHF chủ yếu do multipath: tín hiệu phản xạ từ địa hình/công trình tạo nhiều đường truyền đến máy thu, giao thoa cộng/trừ biên độ.`},{c:"VHF - Lý thuyết chung",q:`Thiết bị nào sau đây dùng để đo công suất phản xạ và hệ số VSWR của hệ thống anten?`,o:["A. Máy hiện sóng (Oscilloscope).", "B. Máy đo công suất RF (Wattmeter)", "C. Đồng hồ vạn năng DC.", "D. Máy tạo xung."],a:1,e:`Đo công suất phản xạ và VSWR dùng máy đo công suất RF (Wattmeter) có chức năng đo sóng dội.`},{c:"VHF - Lý thuyết chung",q:`Khi lắp đặt hệ thống anten trên cột, yếu tố nào cần được ưu tiên hàng đầu để tránh nhiễu lẫn nhau giữa các máy phát?`,o:["A. Nhiệt độ môi trường.", "B. Màu sắc của cáp.", "C. Độ cao của cột", "D. Sự cách ly về tần số (Frequency Separation) và khoảng cách vật lý (Spatial Separation)."],a:3,e:`Lắp đặt nhiều anten trên cột cần ưu tiên cách ly tần số (frequency separation) và khoảng cách vật lý (spatial separation) để tránh nhiễu lẫn nhau.`},{c:"VHF - Lý thuyết chung",q:`VoIP là viết tắt của thuật ngữ nào?`,o:["A. Voice over Internet Protocol", "B. Voice over IP Phone", "C. Video over Internet Protocol", "D. Voice over Intranet Process"],a:0,e:`VoIP = Voice over Internet Protocol (thoại qua giao thức Internet).`},{c:"VHF - Lý thuyết chung",q:`Giao thức nào được sử dụng phổ biến nhất để thiết lập, duy trì và kết thúc phiên gọi (signaling) trong VoIP hiện nay?`,o:["A. RTP", "B. SIP", "C. SNMP", "D. SMTP"],a:1,e:`SIP (Session Initiation Protocol) là giao thức báo hiệu phổ biến nhất để thiết lập, duy trì và kết thúc phiên gọi VoIP.`},{c:"VHF - Lý thuyết chung",q:`Giao thức nào chịu trách nhiệm truyền tải dữ liệu thoại (media) theo thời gian thực trong VoIP?`,o:["A. TCP", "B. HTTP", "C. RTP", "D. FTP"],a:2,e:`RTP (Real-time Transport Protocol) chịu trách nhiệm truyền tải dữ liệu thoại/media theo thời gian thực.`},{c:"VHF - Lý thuyết chung",q:`RTCP có chức năng chính là gì?`,o:["A. Truyền tải gói tin thoại", "B. Giám sát chất lượng và cung cấp thông tin phản hồi cho phiên RTP", "C. Mã hoá tín hiệu thoại", "D. Định tuyến cuộc gọi đến gateway"],a:1,e:`RTCP (RTP Control Protocol) giám sát chất lượng phiên RTP và cung cấp thông tin phản hồi (jitter, packet loss, delay).`},{c:"VHF - Lý thuyết chung",q:`Codec nào sau đây cung cấp chất lượng thoại cao nhất (toll-quality) nhưng tiêu tốn nhiều băng thông nhất (~64 kbps)?`,o:["A. G.729", "B. G.723.1", "C. G.711", "D. GSM"],a:2,e:`G.711 PCM: 64 kbps, chất lượng thoại cao nhất (toll-quality), không nén lossy.`},{c:"VHF - Lý thuyết chung",q:`Codec G.729 thường được sử dụng vì lý do nào?`,o:["A. Chất lượng cao hơn G.711", "B. Tiết kiệm băng thông (~8 kbps) phù hợp đường truyền hẹp", "C. Không cần xử lý nén", "D. Miễn phí bản quyền hoàn toàn"],a:1,e:`G.729 tiết kiệm băng thông (~8 kbps, nén 8:1 so với G.711), phù hợp đường truyền băng hẹp.`},{c:"VHF - Lý thuyết chung",q:`Trong VoIP, “jitter” có nghĩa là gì?`,o:["A. Mất gói tin trên đường truyền", "B
